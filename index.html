<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米手环竞对分析平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 4px 24px rgba(0,0,0,.08);width:380px;max-width:90vw}
.login-box .icon{text-align:center;font-size:2.4em;margin-bottom:8px}
.login-box h1{font-size:1.4em;color:#1a1a2e;margin-bottom:8px;text-align:center}
.login-box .sub{color:#888;font-size:.85em;text-align:center;margin-bottom:32px}
.login-box label{display:block;font-size:.85em;color:#555;margin-bottom:6px}
.login-box input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:.95em;margin-bottom:20px;outline:none;transition:border .2s}
.login-box input:focus{border-color:#4ECDC4}
.login-box .error{color:#e74c3c;font-size:.8em;text-align:center;margin-bottom:12px;display:none}
.login-box button{width:100%;padding:12px;background:#4ECDC4;color:#fff;border:none;border-radius:8px;font-size:1em;font-weight:600;cursor:pointer;transition:background .2s}
.login-box button:hover{background:#3dbdb5}
</style>
</head>
<body>
<div class="login-box">
<div class="icon">🔐</div>
<h1>小米手环竞对分析平台</h1>
<p class="sub">请登录后查看数据</p>
<label>用户名</label>
<input type="text" id="lu" placeholder="请输入用户名" autofocus>
<label>密码</label>
<input type="password" id="lp" placeholder="请输入密码" onkeydown="if(event.key==='Enter')document.getElementById('lb').click()">
<p class="error" id="le">用户名或密码错误</p>
<button id="lb" onclick="
var u=document.getElementById('lu').value;
var p=document.getElementById('lp').value;
if(u==='zhangdongjie'&&p==='zdjzdj'){
localStorage.setItem('mi_band_auth_v1','1');
window.location.href='hub.html';
}else{
document.getElementById('le').style.display='block';
}
">登 录</button>
</div>
</body>
</html>
