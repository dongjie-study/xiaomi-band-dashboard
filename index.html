<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米手环竞对分析平台</title>
<style>
  :root {
    --sidebar-w: 240px;
    --bg:        #f0f2f5;
    --sidebar-bg:#1a1f2b;
    --sidebar-text:#9ca3b2;
    --sidebar-active:#ffffff;
    --surface:   #ffffff;
    --text:      #1a1d28;
    --text-secondary:#6b7280;
    --border:    #e5e7eb;
    --radius:    12px;
    --transition:.22s ease;

    --clr-sales:      #ff6b35;
    --clr-violations: #ef4444;
    --clr-strategy:   #f59e0b;
    --clr-video:      #3b82f6;
    --clr-hourly:     #8b5cf6;
    --clr-gsv:        #0891b2;
    --clr-upgrade:    #ec4899;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 100;
    overflow-y: auto;
  }

  .sidebar-brand {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .sidebar-brand:hover { opacity: .8; }

  .sidebar-brand .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-brand .logo-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: linear-gradient(135deg, #ff6b35, #f59e0b);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1em;
    color: #fff;
    flex-shrink: 0;
  }

  .sidebar-brand .logo-text {
    font-size: .9em;
    font-weight: 700;
    color: #e2e6ec;
    line-height: 1.3;
    letter-spacing: -.01em;
  }

  .sidebar-brand .logo-text small {
    display: block;
    font-weight: 400;
    font-size: .72em;
    color: #6b7280;
    letter-spacing: 0;
  }

  .sidebar-nav { flex: 1; padding: 12px 0; }

  .sidebar-nav .nav-section {
    padding: 14px 20px 4px;
    font-size: .65em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #4b5563;
  }

  .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    margin: 1px 10px;
    border-radius: 8px;
    text-decoration: none;
    color: var(--sidebar-text);
    font-size: .87em;
    font-weight: 500;
    transition: all var(--transition);
    cursor: pointer;
  }

  .sidebar-nav a:hover {
    background: rgba(255,255,255,.04);
    color: #d1d5db;
  }

  .sidebar-nav a.active {
    background: rgba(255,255,255,.08);
    color: var(--sidebar-active);
    font-weight: 600;
  }

  .sidebar-nav a .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: .7;
  }

  .sidebar-nav a.sales .nav-dot      { background: var(--clr-sales); }
  .sidebar-nav a.violations .nav-dot { background: var(--clr-violations); }
  .sidebar-nav a.strategy .nav-dot   { background: var(--clr-strategy); }
  .sidebar-nav a.video .nav-dot      { background: var(--clr-video); }
  .sidebar-nav a.hourly .nav-dot     { background: var(--clr-hourly); }
  .sidebar-nav a.gsv .nav-dot        { background: var(--clr-gsv); }
  .sidebar-nav a.upgrade .nav-dot    { background: var(--clr-upgrade); }

  .sidebar-nav a .badge-nav {
    margin-left: auto;
    font-size: .65em;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: .03em;
  }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,.06);
    font-size: .72em;
    color: #4b5563;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .sidebar-footer .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 5px rgba(34,197,94,.5);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .4; transform: scale(1.6); }
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .topbar .back-btn {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: .8em;
    color: var(--text-secondary);
    transition: all var(--transition);
  }

  .topbar .back-btn:hover { background: #f5f6f8; color: var(--text); }
  .topbar .back-btn.show { display: inline-flex; }

  .topbar .breadcrumb {
    font-size: .82em;
    color: var(--text-secondary);
    flex: 1;
  }

  .topbar .breadcrumb span { color: #ff6b35; font-weight: 600; }

  .topbar .module-title {
    font-size: .88em;
    font-weight: 700;
    color: var(--text);
    display: none;
  }
  .topbar .module-title.show { display: block; }

  /* ===== CONTENT AREA ===== */
  .content {
    flex: 1;
    overflow: auto;
  }

  /* Overview panel */
  .overview { padding: 28px 32px 36px; }
  .overview.hidden { display: none; }

  .overview h1 {
    font-size: 1.5em;
    font-weight: 800;
    letter-spacing: -.02em;
    margin-bottom: 24px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 22px;
    border: 1px solid var(--border);
    transition: box-shadow var(--transition);
  }
  .stat-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.06); }

  .stat-card .stat-label {
    font-size: .72em;
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: .03em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-card .stat-value {
    font-size: 1.7em;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
  }
  .stat-card .stat-sub {
    font-size: .75em;
    color: var(--text-secondary);
    margin-top: 4px;
  }


  /* Iframe panel */
  .iframe-panel {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }
  .iframe-panel.show { display: block; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 700px) {
    .sidebar { width: 56px; }
    .sidebar .logo-text,
    .sidebar-nav .nav-section,
    .sidebar-nav a span:not(.nav-dot),
    .sidebar-nav a .badge-nav,
    .sidebar-footer span { display: none; }
    .sidebar-nav a { justify-content: center; padding: 12px; margin: 1px 8px; }
    .sidebar-nav a .nav-dot { width: 10px; height: 10px; }
    .sidebar-brand { padding: 16px 10px; }
    .sidebar-brand .logo { justify-content: center; }
    .main { margin-left: 56px; }
    .topbar { padding: 0 14px; }
    .overview { padding: 20px 14px 24px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    :root { --sidebar-w: 56px; }
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr; }
    .overview { padding: 16px 10px 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none !important; }
  }
</style>
</head>
<body>

<script>localStorage.setItem('mi_band_auth_v1','1');</script>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="sidebar-brand" onclick="goHome()">
    <div class="logo">
      <div class="logo-icon">⌚</div>
      <div class="logo-text">
        小米手环<br><small>竞对分析平台</small>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">数据看板</div>
    <a data-module="sales" data-title="穿戴直播间销量分析" data-url="sales_analysis/index.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 销量分析
      <span class="badge-nav" style="background:rgba(255,107,53,.15);color:#ff6b35;">HOT</span>
    </a>
    <a data-module="hourly" data-title="直播间小时级出单分析" data-url="小时分析/index.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 小时级出单
    </a>

    <div class="nav-section">竞争情报</div>
    <a data-module="violations" data-title="违规情况分析" data-url="违规情况/report.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 违规追踪
    </a>
    <a data-module="video" data-title="千川视频分析" data-url="核心指标分析/核心指标报告.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 千川视频分析
    </a>

    <div class="nav-section">运营工具</div>
    <a data-module="strategy" data-title="全域营销战略" data-url="strategy.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 营销战略
    </a>
    <a data-module="gsv" data-title="主播业绩工具" data-url="gsv.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 主播业绩
    </a>
    <a data-module="upgrade" data-title="视频提升方案" data-url="视频提升方案_可视化.html" onclick="openModule(this)">
      <span class="nav-dot"></span> 视频提升方案
    </a>
  </nav>

  <div class="sidebar-footer">
    <span class="live-dot"></span> <span>系统运行中</span>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main">
  <!-- Top bar -->
  <div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goHome()">← 返回概览</button>
    <span class="breadcrumb" id="breadcrumb">首页 / <span>工作台</span></span>
    <span class="module-title" id="moduleTitle"></span>
  </div>

  <!-- Content area -->
  <div class="content">
    <!-- Overview panel -->
    <div class="overview" id="overview">
      <h1>概览</h1>

      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-label">今日订单</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">今日销售额</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">监控直播间</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">历史天数</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
      </div>

    </div>

    <!-- Iframe panel -->
    <iframe class="iframe-panel" id="iframePanel" src="about:blank"></iframe>
  </div>
</main>

<script>
// Module registry — module cards and sidebar links both use data-module
var modules = {};
document.querySelectorAll('[data-module]').forEach(function(el) {
  var m = el.dataset.module;
  if (!modules[m]) modules[m] = {};
  if (el.dataset.url) { modules[m].url = el.dataset.url; modules[m].title = el.dataset.title; }
});

function openModule(el) {
  var m = el.dataset.module;
  var info = modules[m];
  if (!info || !info.url) return;

  // Update sidebar active
  document.querySelectorAll('.sidebar-nav a').forEach(function(a) { a.classList.remove('active'); });
  var sideLink = document.querySelector('.sidebar-nav a[data-module="' + m + '"]');
  if (sideLink) sideLink.classList.add('active');

  // Switch to iframe
  document.getElementById('overview').classList.add('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.src = info.url;
  iframe.classList.add('show');

  // Update topbar
  document.getElementById('backBtn').classList.add('show');
  document.getElementById('breadcrumb').innerHTML = '首页 / <span>' + info.title + '</span>';
  document.getElementById('moduleTitle').classList.add('show');
  document.getElementById('moduleTitle').textContent = info.title;
}

function goHome() {
  // Clear sidebar active
  document.querySelectorAll('.sidebar-nav a').forEach(function(a) { a.classList.remove('active'); });

  // Switch to overview
  document.getElementById('overview').classList.remove('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.classList.remove('show');
  iframe.src = 'about:blank';

  // Update topbar
  document.getElementById('backBtn').classList.remove('show');
  document.getElementById('breadcrumb').innerHTML = '首页 / <span>工作台</span>';
  document.getElementById('moduleTitle').classList.remove('show');
}

// Overview stats — hardcoded from latest data
(function(){
  var cards = document.querySelectorAll('.stat-card');
  cards[0].querySelector('.stat-value').textContent = '2,621 单';
  cards[0].querySelector('.stat-sub').textContent = '2026-06-14';
  cards[1].querySelector('.stat-value').textContent = '¥ 94.4 万';
  cards[1].querySelector('.stat-sub').textContent = '均价 ¥360';
  cards[2].querySelector('.stat-value').textContent = '10 间';
  cards[2].querySelector('.stat-sub').textContent = '我方 4 间 · 竞对 6 间';
  cards[3].querySelector('.stat-value').textContent = '14 天';
  cards[3].querySelector('.stat-sub').textContent = '2026-06-01 ~ 2026-06-14';
})();
</script>
</body>
</html>
