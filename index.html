<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分析平台</title>
<style>
  :root {
    --sidebar-w: 240px;
    --bg:           #f6f7f9;
    --sidebar-bg:   #bcc3ce;
    --sidebar-text: #23272d;
    --sidebar-active:#03050a;
    --sidebar-hover:#afb7c3;
    --surface:      #ffffff;
    --text:         #111827;
    --text-secondary:#6b7280;
    --text-muted:   #9ca3af;
    --border:       #afb7c3;
    --border-light: #bcc3ce;
    --radius:       12px;
    --radius-sm:    8px;
    --transition:   .25s cubic-bezier(0.4, 0, 0.2, 1);
    --shadow-sm:    0 1px 2px rgba(0,0,0,.03);
    --shadow-md:    0 4px 12px rgba(0,0,0,.05), 0 1px 3px rgba(0,0,0,.04);
    --shadow-lg:    0 12px 28px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);

    --clr-sales:      #f97316;
    --clr-violations: #ef4444;
    --clr-strategy:   #f59e0b;
    --clr-video:      #3b82f6;
    --clr-hourly:     #8b5cf6;
    --clr-gsv:        #0891b2;
    --clr-upgrade:    #ec4899;
    --clr-visual:     #10b981;
    --clr-streamer:   #ec4899;
    --clr-monthly:    #1da85c;
    --clr-event:      #f59e0b;

    --clr-sales-bg:      #fff7ed;
    --clr-violations-bg: #fef2f2;
    --clr-strategy-bg:   #fffbeb;
    --clr-video-bg:      #eff6ff;
    --clr-hourly-bg:     #f5f3ff;
    --clr-gsv-bg:        #ecfeff;
    --clr-upgrade-bg:    #fdf2f8;
    --clr-visual-bg:     #ecfdf5;
    --clr-streamer-bg:   #fdf2f8;
    --clr-monthly-bg:    #ecfdf5;
    --clr-event-bg:      #fffbeb;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Ambient bg grain */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 80% 60% at 30% 20%, rgba(59,130,246,.025) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(249,115,22,.02) 0%, transparent 60%);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    inset: 0 auto 0 0;
    z-index: 100;
    overflow-y: auto;
    border-right: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }

  .sidebar-brand {
    padding: 24px 20px 20px;
    cursor: pointer;
    transition: background var(--transition);
    border-bottom: 1px solid var(--border-light);
  }
  .sidebar-brand:hover { background: #afb7c3; }

  .sidebar-brand .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sidebar-brand .logo-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    object-fit: contain;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(255,105,0,.15);
  }

  .sidebar-brand .logo-text {
    font-size: .92em;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -.01em;
  }

  .sidebar-brand .logo-text small {
    display: block;
    font-weight: 400;
    font-size: .72em;
    color: var(--text-muted);
    letter-spacing: .01em;
  }

  .sidebar-nav { flex: 1; padding: 8px 0; }

  .sidebar-nav .nav-section {
    padding: 16px 20px 6px;
    font-size: .64em;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .09em;
    color: var(--text-muted);
  }

  .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    margin: 1px 10px;
    border-radius: 8px;
    text-decoration: none;
    color: var(--sidebar-text);
    font-size: .86em;
    font-weight: 500;
    transition: all var(--transition);
    cursor: pointer;
    position: relative;
  }

  /* Subtle left accent on hover */
  .sidebar-nav a::after {
    content: '';
    position: absolute;
    left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 0;
    border-radius: 0 3px 3px 0;
    background: var(--clr-sales);
    transition: height .25s ease;
  }

  .sidebar-nav a.sales::after      { background: var(--clr-sales); }
  .sidebar-nav a.violations::after { background: var(--clr-violations); }
  .sidebar-nav a.strategy::after   { background: var(--clr-strategy); }
  .sidebar-nav a.video::after      { background: var(--clr-video); }
  .sidebar-nav a.hourly::after     { background: var(--clr-hourly); }
  .sidebar-nav a.gsv::after        { background: var(--clr-gsv); }
  .sidebar-nav a.upgrade::after    { background: var(--clr-upgrade); }
  .sidebar-nav a.visual::after     { background: var(--clr-visual); }
  .sidebar-nav a.streamer::after   { background: var(--clr-streamer); }
  .sidebar-nav a.monthlySummary::after { background: var(--clr-monthly); }
  .sidebar-nav a.eventSummary::after   { background: var(--clr-event); }

  .sidebar-nav a:hover {
    background: var(--sidebar-hover);
    color: var(--sidebar-active);
  }

  .sidebar-nav a:hover::after {
    height: 16px;
  }

  .sidebar-nav a.active {
    background: #f0f4ff;
    color: #1e40af;
    font-weight: 600;
  }

  .sidebar-nav a.active::after {
    height: 24px;
    animation: breathe-bar 2.5s ease-in-out infinite;
  }

  @keyframes breathe-bar {
    0%, 100% { opacity: 1; }
    50%      { opacity: .45; }
  }

  .sidebar-nav a .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: box-shadow var(--transition), transform var(--transition);
  }

  .sidebar-nav a:hover .nav-dot,
  .sidebar-nav a.active .nav-dot {
    box-shadow: 0 0 8px currentColor;
    transform: scale(1.2);
  }

  .sidebar-nav a.sales .nav-dot      { background: var(--clr-sales); }
  .sidebar-nav a.violations .nav-dot { background: var(--clr-violations); }
  .sidebar-nav a.strategy .nav-dot   { background: var(--clr-strategy); }
  .sidebar-nav a.video .nav-dot      { background: var(--clr-video); }
  .sidebar-nav a.hourly .nav-dot     { background: var(--clr-hourly); }
  .sidebar-nav a.gsv .nav-dot        { background: var(--clr-gsv); }
  .sidebar-nav a.upgrade .nav-dot    { background: var(--clr-upgrade); }
  .sidebar-nav a.visual .nav-dot     { background: var(--clr-visual); }
  .sidebar-nav a.streamer .nav-dot   { background: var(--clr-streamer); }
  .sidebar-nav a.monthlySummary .nav-dot { background: var(--clr-monthly); }
  .sidebar-nav a.eventSummary .nav-dot   { background: var(--clr-event); }

  .sidebar-nav a .badge-nav {
    font-size: .64em;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: .03em;
    background: #fff7ed;
    color: var(--clr-sales);
  }

  .sidebar-nav a .sub-arrow {
    font-size: .65em;
    transition: transform .25s ease;
    opacity: .5;
  }
  .sidebar-nav a.expanded .sub-arrow { transform: rotate(90deg); opacity: 1; }

  .sub-menu { padding: 2px 0; overflow: hidden; }
  .sub-menu a {
    padding: 6px 14px 6px 42px;
    margin: 0 10px;
    font-size: .78em;
    font-weight: 400;
    color: var(--text-secondary);
    display: block;
    text-decoration: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition);
  }
  .sub-menu a:hover { color: var(--text); background: var(--sidebar-hover); }
  .sub-menu a.active { color: #1e40af; background: #f0f4ff; font-weight: 600; }

  /* 月份项（二级） */
  .month-item {
    padding: 6px 14px 6px 42px;
    margin: 0 10px;
    font-size: .8em;
    font-weight: 500;
    color: var(--text-secondary);
    display: block;
    text-decoration: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }
  .month-item:hover, .period-item:hover { color: var(--text); background: var(--sidebar-hover); }
  .month-item.active, .period-item.active { color: #1e40af; background: #f0f4ff; font-weight: 600; }
  .month-item.expanded, .period-item.expanded { color: var(--text); font-weight: 600; }
  .month-item .sub-arrow, .period-item .sub-arrow { transition: transform .25s ease; }
  .month-item.expanded .sub-arrow, .period-item.expanded .sub-arrow { transform: rotate(90deg); opacity: 1; }

  /* 日期项（三级，更深缩进） */
  .month-dates a {
    padding: 5px 14px 5px 58px !important;
    font-size: .74em !important;
  }
    padding: 14px 20px;
    border-top: 1px solid var(--border-light);
    font-size: .72em;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .sidebar-footer .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 0 rgba(34,197,94,.4);
    animation: pulse-ring 2s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
    70%  { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: rgba(255,255,255,.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-light);
    padding: 0 28px;
    height: 50px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .topbar .breadcrumb {
    font-size: .8em;
    color: var(--text-muted);
  }

  .topbar .breadcrumb span {
    color: #ff6900;
    font-weight: 600;
  }

  /* ===== CONTENT AREA ===== */
  .content {
    flex: 1;
    overflow: auto;
    background: transparent;
  }

  /* Overview panel */
  .overview { padding: 32px 36px 40px; }
  .overview.hidden { display: none; }

  .overview h1 {
    font-size: 1.6em;
    font-weight: 800;
    letter-spacing: -.025em;
    margin-bottom: 6px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 22px 24px;
    border: 1px solid var(--border);
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(59,130,246,.03) 50%, transparent 60%);
    opacity: 0;
    transition: opacity .4s ease;
  }

  .stat-card:hover {
    box-shadow: var(--shadow-md);
    border-color: #c8d6e5;
  }
  .stat-card:hover::after { opacity: 1; }

  .stat-card .stat-label {
    font-size: .7em;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .stat-card .stat-value {
    font-size: 1.85em;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -.02em;
  }

  .stat-card .stat-sub {
    font-size: .75em;
    color: var(--text-muted);
    margin-top: 5px;
  }

  .module-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .module-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 26px 24px 22px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .module-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: transparent;
  }

  /* Top gradient strip on hover */
  .module-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 0;
    transition: height .3s ease;
  }

  .module-card:hover::before { height: 3px; }

  .module-card.sales::before      { background: linear-gradient(90deg, var(--clr-sales), #fdba74); }
  .module-card.violations::before { background: linear-gradient(90deg, var(--clr-violations), #fca5a5); }
  .module-card.strategy::before   { background: linear-gradient(90deg, var(--clr-strategy), #fcd34d); }
  .module-card.video::before      { background: linear-gradient(90deg, var(--clr-video), #93c5fd); }
  .module-card.hourly::before     { background: linear-gradient(90deg, var(--clr-hourly), #c4b5fd); }
  .module-card.gsv::before        { background: linear-gradient(90deg, var(--clr-gsv), #67e8f9); }
  .module-card.upgrade::before    { background: linear-gradient(90deg, var(--clr-upgrade), #f9a8d4); }
  .module-card.streamer::before   { background: linear-gradient(90deg, var(--clr-streamer), #f9a8d4); }
  .module-card.monthlySummary::before { background: linear-gradient(90deg, var(--clr-monthly), #6ee7b7); }
  .module-card.eventSummary::before   { background: linear-gradient(90deg, var(--clr-event), #fcd34d); }

  .module-card .mod-icon {
    width: 46px; height: 46px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.35em;
    margin-bottom: 14px;
    transition: transform var(--transition), box-shadow var(--transition);
  }

  .module-card:hover .mod-icon {
    transform: scale(1.08);
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }

  .module-card.sales .mod-icon      { background: var(--clr-sales-bg); }
  .module-card.violations .mod-icon { background: var(--clr-violations-bg); }
  .module-card.strategy .mod-icon   { background: var(--clr-strategy-bg); }
  .module-card.video .mod-icon      { background: var(--clr-video-bg); }
  .module-card.hourly .mod-icon     { background: var(--clr-hourly-bg); }
  .module-card.gsv .mod-icon        { background: var(--clr-gsv-bg); }
  .module-card.upgrade .mod-icon    { background: var(--clr-upgrade-bg); }
  .module-card.visual .mod-icon     { background: var(--clr-visual-bg); }
  .module-card.streamer .mod-icon   { background: var(--clr-streamer-bg); }
  .module-card.monthlySummary .mod-icon { background: var(--clr-monthly-bg); }
  .module-card.eventSummary .mod-icon   { background: var(--clr-event-bg); }

  .module-card h3 {
    font-size: .95em;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -.01em;
    transition: color var(--transition);
  }

  .module-card.sales:hover h3      { color: var(--clr-sales); }
  .module-card.violations:hover h3 { color: var(--clr-violations); }
  .module-card.strategy:hover h3   { color: var(--clr-strategy); }
  .module-card.video:hover h3      { color: var(--clr-video); }
  .module-card.hourly:hover h3     { color: var(--clr-hourly); }
  .module-card.gsv:hover h3        { color: var(--clr-gsv); }
  .module-card.upgrade:hover h3    { color: var(--clr-upgrade); }
  .module-card.streamer:hover h3   { color: var(--clr-streamer); }
  .module-card.monthlySummary:hover h3 { color: var(--clr-monthly); }
  .module-card.eventSummary:hover h3   { color: var(--clr-event); }

  .module-card p {
    font-size: .8em;
    color: var(--text-secondary);
    line-height: 1.55;
    flex: 1;
    margin-bottom: 14px;
  }

  .module-card .mod-tag {
    font-size: .66em;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    align-self: flex-start;
    padding: 3px 10px;
    border-radius: 12px;
    transition: all var(--transition);
  }

  .module-card.sales .mod-tag      { background: var(--clr-sales-bg); color: var(--clr-sales); }
  .module-card.violations .mod-tag { background: var(--clr-violations-bg); color: var(--clr-violations); }
  .module-card.strategy .mod-tag   { background: var(--clr-strategy-bg); color: var(--clr-strategy); }
  .module-card.video .mod-tag      { background: var(--clr-video-bg); color: var(--clr-video); }
  .module-card.hourly .mod-tag     { background: var(--clr-hourly-bg); color: var(--clr-hourly); }
  .module-card.gsv .mod-tag        { background: var(--clr-gsv-bg); color: var(--clr-gsv); }
  .module-card.upgrade .mod-tag    { background: var(--clr-upgrade-bg); color: var(--clr-upgrade); }
  .module-card.visual .mod-tag     { background: var(--clr-visual-bg); color: var(--clr-visual); }
  .module-card.streamer .mod-tag   { background: var(--clr-streamer-bg); color: var(--clr-streamer); }
	  .module-card.monthlySummary .mod-tag { background: var(--clr-monthly-bg); color: var(--clr-monthly); }
	  .module-card.eventSummary .mod-tag   { background: var(--clr-event-bg); color: var(--clr-event); }

  .module-card:hover .mod-tag {
    filter: brightness(.97);
    transform: translateY(-1px);
  }

  /* Iframe panel */
  .iframe-panel {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    background: #fff;
  }
  .iframe-panel.show { display: block; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .module-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width: 700px) {
    .sidebar { width: 56px; }
    .sidebar .logo-text,
    .sidebar-nav .nav-section,
    .sidebar-nav a span:not(.nav-dot),
    .sidebar-nav a .badge-nav,
    .sidebar-nav a .sub-arrow,
    .sidebar-footer span,
    .sub-menu { display: none !important; }
    .sidebar-nav a { justify-content: center; padding: 12px; margin: 1px 8px; }
    .sidebar-nav a .nav-dot { width: 10px; height: 10px; }
    .sidebar-nav a::after { display: none; }
    .sidebar-brand { padding: 16px 10px; border-bottom: none; }
    .sidebar-brand .logo { justify-content: center; }
    .main { margin-left: 56px; }
    .topbar { padding: 0 14px; }
    .overview { padding: 20px 14px 24px; }
    .module-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    :root { --sidebar-w: 56px; }
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: 1fr; }
    .overview { padding: 16px 10px 20px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .live-dot, .live-dot * { animation: none !important; }
    .sidebar-nav a.active::after { animation: none !important; }
    .stat-card::after { display: none; }
  }
</style>
</head>
<body>

<script>localStorage.setItem('mi_band_auth_v1','1');</script>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar">
  <div class="sidebar-brand" onclick="goHome()">
    <div class="logo">
      <img class="logo-icon" src="xiaomi-logo.png" alt="小米">
      <div class="logo-text">
        分析平台<br><small>数据指挥中心</small>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- 由 modules.json 动态渲染 -->
  </nav>

  <div class="sidebar-footer">
    <span class="live-dot"></span> <span>系统运行中</span>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main">
  <!-- Top bar -->
  <div class="topbar">
    <span class="breadcrumb" id="breadcrumb">首页 / <span>工作台</span></span>
  </div>

  <!-- Content area -->
  <div class="content">
    <!-- Overview panel -->
    <div class="overview" id="overview">
      <h1>概览</h1>

      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-label">今日订单</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">今日销售额</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">监控直播间</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
        <div class="stat-card"><div class="stat-label">历史天数</div><div class="stat-value">--</div><div class="stat-sub">加载中...</div></div>
      </div>

      <div class="module-grid" id="moduleGrid">
        <!-- 由 modules.json 动态渲染 -->
      </div>
    </div>

    <!-- Iframe panel -->
    <iframe class="iframe-panel" id="iframePanel" src="about:blank"></iframe>
  </div>
</main>

<script src="sales_analysis/stats_data.js"></script>
<script>
// ============================================================
// 模块配置 — 从 modules.json 加载，统一管理侧边栏和首页卡片
// 多人协作：每个人只需在 modules.json 里添加自己的模块即可
// ============================================================
var modules = {};   // 全局模块注册表 { id: {url, title} }
var __MODULE_CONFIG__ = null;

fetch('modules.json')
  .then(function(r) { return r.json(); })
  .then(function(config) {
    __MODULE_CONFIG__ = config;
    renderSidebar(config);
    renderModuleCards(config);
    buildModuleRegistry(config);
  })
  .catch(function(e) {
    console.error('加载 modules.json 失败:', e);
  });

// ----- 渲染侧边栏 -----
function renderSidebar(config) {
  var nav = document.getElementById('sidebarNav');
  if (!nav) return;
  var html = '';
  config.sections.forEach(function(section) {
    html += '<div class="nav-section">' + section.name + '</div>';
    section.modules.forEach(function(mod) {
      var cls = mod.id;
      if (mod.hasSubMenu && mod.subModules) {
        // Parent with month sub-modules → each month expands to dates
        var subMenuId = 'subMenu_' + mod.id;
        html += '<a data-module="' + mod.id + '" data-title="' + mod.title + '" data-url="' + mod.url + '" onclick="toggleSubMenu(this, \'' + subMenuId + '\')" class="' + cls + '">';
        html += '<span class="nav-dot"></span> ' + mod.title;
        if (mod.badge) html += '<span class="badge-nav">' + mod.badge + '</span>';
        html += '<span class="sub-arrow">&#x25B8;</span></a>';
        html += '<div class="sub-menu" id="' + subMenuId + '" style="display:none;">';
        mod.subModules.forEach(function(sub) {
          if (sub.monthKey) {
            // Month → expands to show dates
            var datesId = 'monthDates_' + sub.monthKey;
            html += '<a class="month-item" onclick="toggleMonthDates(this, \'' + sub.monthKey + '\', \'' + datesId + '\')">';
            html += '📅 ' + sub.title;
            if (sub.badge) html += ' <span class="badge-nav">' + sub.badge + '</span>';
            html += '<span class="sub-arrow" style="font-size:.65em;opacity:.5">&#x25B8;</span></a>';
            html += '<div class="sub-menu month-dates" id="' + datesId + '" style="display:none;"></div>';
          } else if (sub.subModules) {
            // Nested sub-modules (e.g. 千川视频分析 → W1/W2/W3 → 核心指标/竞对数据/竞对对比)
            var nestedId = 'nestedSub_' + sub.id;
            html += '<a class="month-item period-item" onclick="toggleNestedSub(this, \'' + nestedId + '\')">';
            html += '📅 ' + sub.title;
            if (sub.badge) html += ' <span class="badge-nav">' + sub.badge + '</span>';
            html += '<span class="sub-arrow" style="font-size:.65em;opacity:.5">&#x25B8;</span></a>';
            html += '<div class="sub-menu month-dates nested-dates" id="' + nestedId + '" style="display:none;">';
            sub.subModules.forEach(function(item) {
              html += '<a data-module="' + item.id + '" data-title="' + item.title + '" data-url="' + item.url + '" data-parent="' + mod.id + '" onclick="openSubModule(this)">';
              html += '📋 ' + item.title;
              if (item.badge) html += ' <span class="badge-nav">' + item.badge + '</span>';
              html += '</a>';
            });
            html += '</div>';
          } else if (sub.url) {
            // Direct link → opens URL
            html += '<a data-module="' + sub.id + '" data-title="' + sub.title + '" data-url="' + sub.url + '" data-parent="' + mod.id + '" onclick="openSubModule(this)">';
            html += '📋 ' + sub.title;
            if (sub.badge) html += ' <span class="badge-nav">' + sub.badge + '</span>';
            html += '</a>';
          }
        });
        html += '</div>';
      } else if (mod.hasSubMenu) {
        // Legacy: dynamic date list without month grouping
        html += '<a data-module="' + mod.id + '" data-title="' + mod.title + '" data-url="' + mod.url + '" onclick="toggleSalesSub(this)" class="' + cls + '">';
        html += '<span class="nav-dot"></span> ' + mod.title;
        if (mod.badge) html += '<span class="badge-nav">' + mod.badge + '</span>';
        html += '<span class="sub-arrow">&#x25B8;</span></a>';
        html += '<div class="sub-menu" id="salesSubMenu" style="display:none;"></div>';
      } else {
        html += '<a data-module="' + mod.id + '" data-title="' + mod.title + '" data-url="' + mod.url + '" onclick="openModule(this)" class="' + cls + '">';
        html += '<span class="nav-dot"></span> ' + mod.title + '</a>';
      }
    });
  });
  nav.innerHTML = html;
}

// ----- 渲染首页模块卡片 -----
function renderModuleCards(config) {
  var grid = document.getElementById('moduleGrid');
  if (!grid) return;
  var html = '';
  config.sections.forEach(function(section) {
    section.modules.forEach(function(mod) {
      html += '<div class="module-card ' + mod.id + '" data-module="' + mod.id + '" onclick="openModule(this)">';
      html += '<div class="mod-icon">' + mod.icon + '</div>';
      html += '<h3>' + mod.title + '</h3>';
      html += '<p>' + mod.description + '</p>';
      html += '<span class="mod-tag">' + mod.tag + '</span>';
      html += '</div>';
    });
  });
  grid.innerHTML = html;
}

// ----- 构建模块注册表 -----
function buildModuleRegistry(config) {
  config.sections.forEach(function(section) {
    section.modules.forEach(function(mod) {
      modules[mod.id] = { url: mod.url, title: mod.title };
      if (mod.subModules) {
        mod.subModules.forEach(function(sub) {
          if (sub.url) {
            modules[sub.id] = { url: sub.url, title: sub.title };
          }
          if (sub.subModules) {
            sub.subModules.forEach(function(item) {
              modules[item.id] = { url: item.url, title: item.title };
            });
          }
        });
      }
    });
  });
}

// ----- 打开模块（iframe 加载） -----
function openModule(el) {
  var m = el.dataset.module;
  var info = modules[m];
  if (!info || !info.url) return;

  // Clear all active
  document.querySelectorAll('.sidebar-nav > a, .sub-menu a, .month-item, .period-item').forEach(function(a) { a.classList.remove('active'); });
  var sideLink = document.querySelector('.sidebar-nav > a[data-module="' + m + '"]');
  if (sideLink) sideLink.classList.add('active');

  // Collapse all sub-menus
  collapseAllSubs();

  // Switch to iframe
  document.getElementById('overview').classList.add('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.src = info.url;
  iframe.classList.add('show');

  // Update topbar
  document.getElementById('breadcrumb').innerHTML = '首页 / <span>' + info.title + '</span>';
}

// ----- 回到首页 -----
function goHome() {
  document.querySelectorAll('.sidebar-nav > a, .sub-menu a, .month-item, .period-item').forEach(function(a) { a.classList.remove('active'); });
  collapseAllSubs();
  document.getElementById('overview').classList.remove('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.classList.remove('show');
  iframe.src = 'about:blank';
  document.getElementById('breadcrumb').innerHTML = '首页 / <span>工作台</span>';
}

// ----- 通用子菜单（一级：销售分析 → 月份）-----
function toggleSubMenu(el, subMenuId) {
  var menu = document.getElementById(subMenuId);
  if (!menu) return;
  var expanded = el.classList.contains('expanded');
  if (expanded) {
    menu.style.display = 'none';
    el.classList.remove('expanded');
    return;
  }
  collapseAllSubs();
  menu.style.display = 'block';
  el.classList.add('expanded');
}

function collapseAllSubs() {
  document.querySelectorAll('.sub-menu').forEach(function(m) { m.style.display = 'none'; });
  document.querySelectorAll('.sidebar-nav > a.expanded, .month-item.expanded, .period-item.expanded').forEach(function(a) { a.classList.remove('expanded'); });
}

// ----- 二级菜单：月份 → 日期 -----
function toggleMonthDates(el, monthKey, datesId) {
  var datesDiv = document.getElementById(datesId);
  if (!datesDiv) return;
  var expanded = el.classList.contains('expanded');
  if (expanded) {
    datesDiv.style.display = 'none';
    el.classList.remove('expanded');
    return;
  }
  // Close other month date lists
  document.querySelectorAll('.month-dates').forEach(function(m) { m.style.display = 'none'; });
  document.querySelectorAll('.month-item.expanded, .period-item.expanded').forEach(function(a) { a.classList.remove('expanded'); });
  // Populate dates if empty
  if (!datesDiv.children.length) {
    buildMonthDates(monthKey, datesDiv);
  }
  datesDiv.style.display = 'block';
  el.classList.add('expanded');
}

// ----- 二级菜单：分析周期 → 报告类型（千川视频分析用）-----
function toggleNestedSub(el, nestedId) {
  var nestedDiv = document.getElementById(nestedId);
  if (!nestedDiv) return;
  var expanded = el.classList.contains('expanded');
  if (expanded) {
    nestedDiv.style.display = 'none';
    el.classList.remove('expanded');
    return;
  }
  // Close other nested date lists
  document.querySelectorAll('.nested-dates, .month-dates').forEach(function(m) { m.style.display = 'none'; });
  document.querySelectorAll('.month-item.expanded, .period-item.expanded').forEach(function(a) { a.classList.remove('expanded'); });
  nestedDiv.style.display = 'block';
  el.classList.add('expanded');
}

function buildMonthDates(monthKey, container) {
  var s = window.__STATS__;
  if (!s || !s.dates) { container.innerHTML = '<a style="color:var(--text-muted);cursor:default">暂无数据</a>'; return; }
  var html = '';
  s.dates.slice().reverse().forEach(function(d) {
    if (d.startsWith(monthKey)) {
      var shortDate = d.substring(5);
      html += '<a onclick="openSalesDate(\'' + d + '\', this)" data-date="' + d + '">📅 ' + shortDate + '</a>';
    }
  });
  if (!html) html = '<a style="color:var(--text-muted);cursor:default">暂无数据</a>';
  container.innerHTML = html;
}

// ----- 打开子模块（直接链接型：月度总结、节点总结、千川视频分析）-----
function openSubModule(el) {
  var url = el.dataset.url;
  var title = el.dataset.title;
  var parentId = el.dataset.parent;
  if (!url) return;

  document.querySelectorAll('.sidebar-nav > a, .sub-menu a, .month-item, .period-item').forEach(function(a) { a.classList.remove('active'); });
  var parentLink = document.querySelector('.sidebar-nav > a[data-module="' + parentId + '"]');
  if (parentLink) parentLink.classList.add('active');
  el.classList.add('active');

  document.getElementById('overview').classList.add('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.src = url;
  iframe.classList.add('show');

  document.getElementById('breadcrumb').innerHTML = '首页 / <span>' + title + '</span>';
}

// ----- 打开每日数据 -----
function openSalesDate(date, el) {
  document.querySelectorAll('.sidebar-nav > a, .sub-menu a, .month-item').forEach(function(a) { a.classList.remove('active'); });
  var salesLink = document.querySelector('.sidebar-nav > a[data-module="sales"]');
  if (salesLink) salesLink.classList.add('active');
  // Also highlight the month item
  var monthPrefix = date.substring(0, 7);
  var monthItem = document.querySelector('.month-item[onclick*="' + monthPrefix + '"]');
  if (monthItem) monthItem.classList.add('active');
  if (el) el.classList.add('active');

  document.getElementById('overview').classList.add('hidden');
  var iframe = document.getElementById('iframePanel');
  iframe.classList.add('show');

  var targetUrl = 'sales_analysis/index.html#' + date;
  if (iframe.src && iframe.src.indexOf('sales_analysis/index.html') !== -1) {
    try { iframe.contentWindow.location.hash = '#' + date; } catch(e) { iframe.src = targetUrl; }
  } else {
    iframe.src = targetUrl;
  }
  document.getElementById('breadcrumb').innerHTML = '首页 / <span>销售分析</span> / ' + date;
}

// ----- 旧版兼容：无月份分组的日期子菜单 -----
function buildSalesDates() {
  var s = window.__STATS__;
  if (!s || !s.dates) return;
  var menu = document.getElementById('salesSubMenu');
  if (!menu) return;
  var html = '';
  s.dates.slice().reverse().forEach(function(d) {
    html += '<a data-date="' + d + '" onclick="openSalesDate(\'' + d + '\', this)">&#x1F4C5; ' + d + '</a>';
  });
  menu.innerHTML = html;
}

function toggleSalesSub(el) {
  var menu = document.getElementById('salesSubMenu');
  if (!menu) return;
  var expanded = el.classList.contains('expanded');
  if (expanded) {
    collapseSalesSub();
    return;
  }
  if (!menu.children.length) buildSalesDates();
  menu.style.display = 'block';
  el.classList.add('expanded');
}

function collapseSalesSub() {
  var menu = document.getElementById('salesSubMenu');
  if (menu) menu.style.display = 'none';
  var salesLink = document.querySelector('.sidebar-nav > a[data-module="sales"]');
  if (salesLink) salesLink.classList.remove('expanded');
}

// ----- 加载概览统计数据 -----
(function(){
  var s = window.__STATS__;
  if (!s) return;
  var cards = document.querySelectorAll('.stat-card');
  cards[0].querySelector('.stat-value').textContent = s.orders.toLocaleString() + ' 单';
  cards[0].querySelector('.stat-sub').textContent = s.date;
  cards[1].querySelector('.stat-value').textContent = '¥ ' + s.revenue + ' 万';
  cards[1].querySelector('.stat-sub').textContent = '均价 ¥' + s.avg_price;
  cards[2].querySelector('.stat-value').textContent = s.rooms + ' 间';
  cards[2].querySelector('.stat-sub').textContent = '我方 ' + s.our_rooms + ' 间 · 竞对 ' + s.comp_rooms + ' 间';
  cards[3].querySelector('.stat-value').textContent = s.days + ' 天';
  cards[3].querySelector('.stat-sub').textContent = s.first_date + ' ~ ' + s.date;
})();
</script>
</body>
