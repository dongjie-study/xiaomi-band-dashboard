document.getElementById('k3').textContent = fmt(D.total_gmv / D.total_orders);
document.getElementById('k4').textContent = (liveGSV / D.total_gmv * 100).toFixed(1) + '%';

// ===== 渠道总览 =====
(function(){
    // Pie
    const c = echarts.init(document.getElementById('ch-pie'));
    c.setOption({
        tooltip:{trigger:'item',formatter:'{b}<br/>{c}元 ({d}%)'},
        color:['#ff6b35','#4caf50'],
        series:[{type:'pie',radius:['42%','72%'],center:['50%','50%'],
            label:{formatter:'{b}\n{d}%',fontSize:14},
            data:D.ch_type.map(x=>({name:x.渠道类型,value:x.GSV}))}]
    });
    window.addEventListener('resize',()=>c.resize());
})();
// Table
(function(){
    let h='';
    D.ch_type.forEach(r=>{
        h+=`<tr><td>${r.渠道类型}</td><td class="r">${fmt(r.GSV)}元</td><td class="r"><span class="tag tag-o">${r.占比}%</span></td><td class="r">${fmt(r.订单数)}单</td></tr>`;
    });
    h+=`<tr class="bold"><td>合计</td><td class="r">${fmt(D.total_gmv)}元</td><td class="r">100%</td><td class="r">${fmt(D.total_orders)}单</td></tr>`;
    document.getElementById('t-ch').innerHTML=h;
})();

// ===== 各直播间品类占比 =====
(function(){
    const container = document.getElementById('room-sections');
    let html = '';

    D.live_rooms.forEach((room, idx) => {
        const items = D.room_detail[room.达人昵称];
        if(!items || items.length===0) return;

        // Chart id
        const chartId = 'room-ch-' + idx;

        html += `<div class="room-card">`;
        html += `<h3>`;
        html += `<span>${room.达人昵称}</span>`;
        html += `<span class="badge" style="background:#fff3e0;color:#e65100;">${fmt(room.GSV)}元 ｜ 占总GSV ${room['占总GSV']}%</span>`;
        html += `<span class="badge" style="background:#e3f2fd;color:#1565c0;">${fmt(room.订单数)}单 ｜ 客单价${fmt(room.客单价)}元</span>`;
        html += `</h3>`;
        html += `<div class="g2">`;
        html += `<div><div id="${chartId}" class="ch"></div></div>`;
        html += `<div><table>`;
        html += `<tr><th>品类</th><th class="r">GSV</th><th class="r">占该直播间</th><th class="r">订单数</th></tr>`;

        items.forEach(item => {
            html += `<tr>
                <td>${item.品类}</td>
                <td class="r">${fmt(item.GSV)}元</td>
                <td class="r"><span class="tag tag-o">${item.直播间占比}%</span></td>
                <td class="r">${fmt(item.订单数)}单</td>
            </tr>`;
        });

        html += `<tr class="bold"><td>合计</td><td class="r">${fmt(room.GSV)}元</td><td class="r">100%</td><td class="r">${fmt(room.订单数)}单</td></tr>`;
        html += `</table></div></div></div>`;
    });

    container.innerHTML = html;

    // Render charts after DOM update
    D.live_rooms.forEach((room, idx) => {
        const items = D.room_detail[room.达人昵称];
        if(!items || items.length===0) return;
        const chartId = 'room-ch-' + idx;
        const el = document.getElementById(chartId);
        if(!el) return;
        const c = echarts.init(el);
        c.setOption({
            tooltip:{trigger:'item',formatter:p=>`${p.name}<br/>${fmt(p.value)}元 (${p.percent}%)`},
            color: COLORS,
            series:[{type:'pie',radius:['35%','65%'],center:['50%','50%'],
                label:{formatter:p=>p.percent>2?`{b|${p.name}}\n{per|${p.percent}%}`:'',rich:{
                    b:{fontSize:12,lineHeight:18},
                    per:{fontSize:11,color:'#999'}
                }},
                data:items.map(x=>({name:x.品类,value:x.GSV}))}]
        });
        window.addEventListener('resize',()=>c.resize());
    });
})();

// ===== 商品卡品类占比 =====
(function(){
    const c = echarts.init(document.getElementById('card-pie'));
    c.setOption({
        tooltip:{trigger:'item',formatter:'{b}<br/>{c}元 ({d}%)'},
        color: COLORS,
        legend:{bottom:0,type:'scroll',textStyle:{fontSize:11}},
        series:[{type:'pie',radius:['35%','65%'],center:['50%','42%'],
            label:{formatter:p=>p.percent>2?`{b|${p.name}}\n{per|${p.percent}%}`:'',rich:{
                b:{fontSize:12,lineHeight:18},
                per:{fontSize:11,color:'#999'}
            }},
            data:D.card_product.map(x=>({name:x.品类,value:x.GSV}))}]
    });
    window.addEventListener('resize',()=>c.resize());

    let h='';
    D.card_product.forEach(r=>{
        h+=`<tr><td>${r.品类}</td><td class="r">${fmt(r.GSV)}元</td><td class="r"><span class="tag tag-g">${r['商品卡占比']}%</span></td><td class="r">${fmt(r.订单数)}单</td><td class="r">${fmt(r.客单价)}元</td></tr>`;
    });
    const cardTotal = D.card_product.reduce((s,r)=>s+r.GSV,0);
    const cardOrders = D.card_product.reduce((s,r)=>s+r.订单数,0);
    h+=`<tr class="bold"><td>合计</td><td class="r">${fmt(cardTotal)}元</td><td class="r">100%</td><td class="r">${fmt(cardOrders)}单</td><td class="r">${fmt(cardTotal/cardOrders)}元</td></tr>`;
    document.getElementById('t-card').innerHTML=h;
})();

(function(){
    const c = echarts.init(document.getElementById('all-pie'));
    c.setOption({
        tooltip:{trigger:'item',formatter:'{b}<br/>{c}元 ({d}%)'},
        color: COLORS,
        legend:{bottom:0,type:'scroll',textStyle:{fontSize:11}},

            label:{formatter:p=>p.percent>2?`{b|${p.name}}\n{per|${p.percent}%}`:'',rich:{
                b:{fontSize:12,lineHeight:18},
                per:{fontSize:11,color:'#999'}
            }},
            data:D.cat_all.map(x=>({name:x.品类,value:x.GSV}))}]
    });
    window.addEventListener('resize',()=>c.resize());

    let h='';
    D.cat_all.forEach(r=>{
        h+=`<tr><td>${r.品类}</td><td class="r">${fmt(r.GSV)}元</td><td class="r"><span class="tag tag-b">${r.占比}%</span></td><td class="r">${fmt(r.订单数)}单</td><td class="r">${fmt(r.客单价)}元</td></tr>`;
    });
    h+=`<tr class="bold"><td>合计</td><td class="r">${fmt(D.total_gmv)}元</td><td class="r">100%</td><td class="r">${fmt(D.total_orders)}单</td><td class="r">${fmt(D.total_gmv/D.total_orders)}元</td></tr>`;
    document.getElementById('t-all').innerHTML=h;
})();
</script>
