<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播间小时级出单分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --text: #0f172a;
  --text-secondary: #64748b;
  --accent: #667eea;
  --accent2: #764ba2;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.10);
  --radius: 14px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(148,163,184,.12) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
.header{position:relative;z-index:1;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:28px 36px;box-shadow:0 4px 20px rgba(102,126,234,.2)}
.header h1{font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.01em}
.header p{opacity:0.88;font-size:13px;font-weight:400}

/* Drag Zone */
.drop-zone{border:2.5px dashed #cbd5e1;border-radius:var(--radius);padding:50px 40px;text-align:center;cursor:pointer;transition:all var(--transition);background:var(--surface);margin:30px auto;max-width:700px;position:relative;z-index:1;box-shadow:var(--shadow-sm)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:#f5f3ff;box-shadow:var(--shadow-md);transform:translateY(-2px)}
.drop-zone .icon{font-size:56px;margin-bottom:12px;transition:transform var(--transition)}
.drop-zone:hover .icon{transform:scale(1.05)}
.drop-zone .title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.drop-zone .hint{font-size:13px;color:var(--text-secondary)}
.drop-zone input{display:none}
.drop-zone.done{border-color:#50b080;background:#f0fdf6}
.drop-zone .filename{font-size:15px;color:#50b080;font-weight:600;margin-top:10px;display:none}
.drop-zone.done .filename{display:block}
.drop-zone.done .icon{font-size:40px}

/* Loading */
.loading{display:none;text-align:center;padding:30px;position:relative;z-index:1}
.loading .spinner{width:40px;height:40px;border:3px solid #e8ecf1;border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Report Container */
.report{display:none;max-width:1500px;margin:0 auto;padding:20px;position:relative;z-index:1}
.section{background:var(--surface);border-radius:var(--radius);padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow-sm);border:1px solid #e8ecf1;transition:box-shadow var(--transition)}
.section:hover{box-shadow:var(--shadow-md)}
.section h2{font-size:18px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #f0f0f0;position:relative}
.section h2::after{content:'';position:absolute;bottom:-2px;left:0;width:40px;height:2px;background:var(--accent);border-radius:1px}
.section h3{font-size:15px;color:var(--text-secondary);margin:14px 0 10px 0;font-weight:600}
.chart{width:100%;height:420px}
.chart-lg{width:100%;height:520px}
.summary-cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.card{flex:1;min-width:150px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:var(--radius);padding:20px 18px;text-align:center;border:1px solid #e8e4f8;transition:transform var(--transition),box-shadow var(--transition)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.card .value{font-size:30px;font-weight:800;color:var(--accent);line-height:1.2}
.card .label{font-size:12px;color:var(--text-secondary);margin-top:4px;font-weight:500;letter-spacing:.02em}
.card.orange{background:linear-gradient(135deg,#fff8f0,#ffe8d6);border-color:#f0dcc8}.card.orange .value{color:#f0a050}
.card.green{background:linear-gradient(135deg,#f0fdf6,#d6ffe8);border-color:#c8f0d8}.card.green .value{color:#50b080}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8f9fc;padding:10px 14px;text-align:center;font-weight:600;color:var(--text-secondary);border-bottom:2px solid #e8ecf1;white-space:nowrap;position:sticky;top:0;z-index:1;font-size:11px;letter-spacing:.03em;text-transform:uppercase}
td{padding:8px 12px;border-bottom:1px solid #f0f2f5;text-align:center}
tbody tr{transition:background var(--transition)}
tbody tr:hover{background:#f8fafc}
.pos{color:#e05050;font-weight:600}
.neg{color:#50b080;font-weight:600}
.tag{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.tag-new{background:#ede9fe;color:#5b4fcf}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;cursor:pointer;font-size:12px;background:#f0f2f5;border:none;transition:all var(--transition);font-weight:500;color:var(--text-secondary)}
.tab:hover{background:#ede9fe;color:var(--accent)}
.tab.active{background:var(--accent);color:white;box-shadow:0 2px 8px rgba(102,126,234,.3)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.sticky-col{position:sticky;left:0;background:white;z-index:2;text-align:left!important;font-weight:500}
th.sticky-col{background:#f8f9fc;z-index:3}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1000px){.grid-2{grid-template-columns:1fr}}
.scroll-wrap{overflow-x:auto;max-height:550px;overflow-y:auto;border-radius:8px;border:1px solid #e8ecf1}
.error-msg{color:#e05050;text-align:center;padding:20px;font-size:14px;display:none}
</style>
</head>
<body>

<div class="header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <h1>直播间小时级出单分析工具</h1>
        <p>拖入订单Excel表格，自动识别列名并生成分析报告 -- 无需关注列顺序和多余列</p>
      </div>
    </div>
</div>

<!-- Column Hint -->
<div style="max-width:700px;margin:24px auto 0;padding:16px 20px;background:#fff;border-radius:12px;border:1px solid #e8ecf1;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;z-index:1;">
  <div style="display:flex;align-items:flex-start;gap:10px;">
    <span style="font-size:18px;flex-shrink:0;">💡</span>
    <div>
      <div style="font-size:13px;font-weight:700;color:#0f172a;margin-bottom:6px;">Excel 表格需包含以下列（自动识别，无需关注顺序）</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        <span style="display:inline-block;padding:3px 10px;background:#e8f0fe;color:#3867d6;border-radius:14px;font-size:12px;font-weight:500;">选购商品</span>
        <span style="display:inline-block;padding:3px 10px;background:#fef3c7;color:#92400e;border-radius:14px;font-size:12px;font-weight:500;">订单提交时间</span>
        <span style="display:inline-block;padding:3px 10px;background:#fce7f3;color:#be185d;border-radius:14px;font-size:12px;font-weight:500;">订单应付金额</span>
        <span style="display:inline-block;padding:3px 10px;background:#d1fae5;color:#065f46;border-radius:14px;font-size:12px;font-weight:500;">达人昵称</span>
      </div>
    </div>
  </div>
</div>

<!-- Drop Zone -->
<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📁</div>
    <div class="title">拖拽Excel文件到此处</div>
    <div class="hint">或点击选择文件 (.xlsx / .xls)</div>
    <div class="filename" id="fileName"></div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
</div>

<!-- Loading -->
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div>正在分析数据...</div>
</div>

<!-- Error -->
<div class="error-msg" id="errorMsg"></div>

<!-- Report -->
<div class="report" id="report">

    <!-- Section 1 -->
    <div class="section">
        <h2>一, 整体概况</h2>
        <div class="summary-cards" id="summaryCards"></div>
        <div class="grid-2">
            <div class="chart" id="chart-hourly"></div>
            <div class="chart" id="chart-product-pie"></div>
        </div>
    </div>

    <!-- Section 2 -->
    <div class="section">
        <h2>二, 商品品类 x 小时 出单热力图</h2>
        <div class="chart chart-lg" id="chart-heatmap"></div>
    </div>

    <!-- Section 3 -->
    <div class="section">
        <h2>三, 各商品品类 -- 直播间分小时出单对比</h2>
        <div class="tabs" id="prod-tabs"></div>
        <div id="prod-panels"></div>
    </div>

    <!-- Section 4 -->
    <div class="section">
        <h2>四, 各直播间详细数据 -- 分小时分品类 + 环比</h2>
        <div class="tabs" id="inf-tabs"></div>
        <div id="inf-panels"></div>
    </div>

</div>

<script>
// ============================================================
// Core Analysis Engine
// ============================================================

// Product classification rules
const CLASSIFY_RULES = [
    ['手环','手环'], ['手表','手表'], ['Watch','手表'], ['耳机','耳机'],
    ['Buds','耳机'], ['Earbuds','耳机'], ['手机','手机'], ['Phone','手机'],
    ['平板','平板'], ['Pad','平板'], ['Tablet','平板'], ['电视','电视'],
    ['TV','电视'], ['笔记本','笔记本'], ['电脑','笔记本'], ['Book','笔记本'],
    ['Laptop','笔记本'], ['音箱','音箱'], ['音响','音箱'], ['Sound','音箱'],
    ['Speaker','音箱'], ['路由器','路由器'], ['Router','路由器'],
    ['充电','充电/配件'], ['数据线','充电/配件'], ['充电器','充电/配件'],
    ['电源','充电/配件'], ['插线板','插线板'], ['插座','插线板'],
    ['开关','插线板'], ['剃须','个人护理'], ['牙刷','个人护理'],
    ['吹风','个人护理'], ['体脂','个人护理'], ['眼镜','智能眼镜'],
    ['净化','生活家电'], ['加湿','生活家电'], ['风扇','生活家电'],
    ['门锁','智能安防'], ['摄像','智能安防'], ['监控','智能安防'],
    ['门铃','智能安防'], ['传感器','智能安防'], ['灯','智能家居'],
    ['灯泡','智能家居'], ['窗帘','智能家居'], ['滑板','出行工具'],
    ['平衡','出行工具'], ['出行','出行工具'], ['箱包','箱包'],
    ['背包','箱包'], ['车','汽车用品'], ['汽车','汽车用品'],
    ['螺丝刀','工具'], ['工具','工具'], ['包','保护壳/膜'],
    ['壳','保护壳/膜'], ['膜','保护壳/膜'], ['保护','保护壳/膜'],
    ['笔','配件'], ['Pen','配件'], ['键盘','配件'],
    ['Tag','Tag定位器'], ['定位','Tag定位器'], ['追踪','Tag定位器'],
];

function classifyProduct(name) {
    let baseCat = '其他';
    for (const [kw, cat] of CLASSIFY_RULES) {
        if (name.includes(kw)) { baseCat = cat; break; }
    }

    if (baseCat === '手环') {
        let brand = name.includes('小米') ? '小米' : (name.includes('REDMI') || name.includes('Redmi') ? 'REDMI' : '');
        for (const num of ['10Pro','10 Pro','10','9Pro','9 Pro','9','8Pro','8 Pro','8','7Pro','7 Pro','7','6','5','4','3']) {
            if (name.includes(num)) {
                const clean = num.replace(' ','');
                return brand ? `${brand}手环${clean}` : `手环${clean}`;
            }
        }
        if (name.includes('Pro')) return brand ? `${brand}手环Pro` : '手环Pro';
        return brand ? `${brand}手环` : '手环';
    }

    if (baseCat === '手表') {
        for (const m of ['Watch 6','Watch6','Watch 5','Watch5','Watch S5','WatchS5','Watch S4','WatchS4']) {
            const c = m.replace(' ','');
            if (name.includes(m)) return m.startsWith('Watch S') ? `Xiaomi ${m}` : `REDMI ${c}`;
        }
        const m = name.match(/Watch\s*(\w?\d+)/);
        if (m) return `Watch ${m[1]}`;
        return '其他手表';
    }

    if (baseCat === '耳机') {
        if (name.includes('Buds 8 Pro') || name.includes('Buds8 Pro')) return 'REDMI Buds 8 Pro';
        if (name.includes('Buds 8') || name.includes('Buds8')) return 'REDMI Buds 8 青春版';
        if (name.includes('Buds 7S') || name.includes('Buds7S')) return 'REDMI Buds 7S';
        if (name.includes('Buds 7') || name.includes('Buds7')) return 'REDMI Buds 7';
        if (name.includes('Buds 6') || name.includes('Buds6')) return 'REDMI Buds 6';
        if (name.includes('Air 4 SE') || name.includes('Air4 SE')) return 'Xiaomi Air 4 SE';
        if (name.includes('Air 4') || name.includes('Air4')) return 'Xiaomi Air 4';
        if (name.includes('开放式')) return '开放式耳机';
        return '其他耳机';
    }

    if (baseCat === '手机') {
        if (name.includes('Pro')) return '手机(Pro)';
        if (name.includes('Ultra')) return '手机(Ultra)';
        if (name.includes('Fold') || name.includes('Flip')) return '手机(折叠)';
        return '手机';
    }

    return baseCat;
}

function extractProductName(raw) {
    raw = String(raw);
    // Remove 【tags】
    let clean = raw.replace(/【[^】]+】/g, '');
    // Remove trailing -SKU
    clean = clean.replace(/-\(\d+\)$/,'').trim();
    const parts = clean.split('-');
    return parts[0].trim();
}

function parseExcel(data) {
    // Smart column detection: find columns by name regardless of position
    const rows = XLSX.utils.sheet_to_json(data, {header:1});
    if (rows.length < 2) throw new Error('Excel文件为空或只有表头');

    // Target columns to find (support partial match / fuzzy match)
    const TARGETS = {
        product:  ['选购商品', '商品', '产品', 'product', 'item'],
        time:     ['订单提交时间', '提交时间', '下单时间', '订单时间', '时间', 'time', 'date'],
        amount:   ['订单应付金额', '应付金额', '订单金额', '金额', '实付', 'amount', 'price'],
        influencer: ['达人昵称', '达人', '昵称', '主播', '直播间', 'influencer', 'anchor', 'kol'],
    };

    // Scan first 10 rows to find header
    let headerRow = null;
    let headerIdx = -1;
    for (let i = 0; i < Math.min(10, rows.length); i++) {
        const r = rows[i];
        if (!r || r.length < 2) continue;
        // Count how many target columns we can match in this row
        let matchCount = 0;
        for (const cell of r) {
            if (!cell) continue;
            const s = String(cell).trim();
            for (const [key, keywords] of Object.entries(TARGETS)) {
                for (const kw of keywords) {
                    if (s.includes(kw)) { matchCount++; break; }
                }
            }
        }
        if (matchCount >= 3) { headerRow = r; headerIdx = i; break; }
    }

    if (!headerRow) {
        // Fallback: treat first row as header if it has 4+ columns
        for (let i = 0; i < Math.min(5, rows.length); i++) {
            if (rows[i] && rows[i].length >= 4) { headerRow = rows[i]; headerIdx = i; break; }
        }
    }
    if (!headerRow) throw new Error('未找到表头行，请确认表格包含: 选购商品, 订单提交时间, 订单应付金额, 达人昵称');

    // Map column indices
    function findCol(targets) {
        for (let j = 0; j < headerRow.length; j++) {
            const s = String(headerRow[j] || '').trim();
            for (const kw of targets) {
                if (s.includes(kw)) return j;
            }
        }
        return -1;
    }

    const colP = findCol(TARGETS.product);
    const colT = findCol(TARGETS.time);
    const colA = findCol(TARGETS.amount);
    const colI = findCol(TARGETS.influencer);

    // Validate we found all required columns
    const missing = [];
    if (colP < 0) missing.push('选购商品');
    if (colT < 0) missing.push('订单提交时间');
    if (colA < 0) missing.push('订单应付金额');
    if (colI < 0) missing.push('达人昵称');
    if (missing.length > 0) {
        throw new Error('未识别到列: ' + missing.join(', ') + '\n表格列名: ' + headerRow.map(c => String(c||'').trim()).filter(Boolean).join(', '));
    }

    console.log('Column mapping:', {product: colP, time: colT, amount: colA, influencer: colI});

    const orders = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r) continue;

        const productRaw = String(r[colP] || '').trim();
        if (!productRaw) continue;

        // Parse time
        let timeStr = String(r[colT] || '').replace(/\t/g,'').trim();
        let dt;
        if (timeStr.match(/^\d{4}-\d{2}-\d{2}/)) {
            dt = new Date(timeStr);
        } else if (timeStr.match(/^\d+\.\d+$/)) {
            dt = new Date((parseFloat(timeStr) - 25569) * 86400 * 1000);
        } else {
            dt = new Date(timeStr);
        }
        if (isNaN(dt.getTime())) continue;

        const hour = dt.getHours();
        const amount = parseFloat(r[colA]) || 0;
        const influencer = String(r[colI] || '').trim();
        if (!influencer) continue;

        const productName = extractProductName(productRaw);
        const category = classifyProduct(productName);

        orders.push({productRaw, productName, category, dt, hour, amount, influencer});
    }

    return orders;
}

// ============================================================
// Report Building
// ============================================================
function buildReport(orders) {
    // Group data
    const totalOrders = orders.length;
    const totalAmt = orders.reduce((s,o) => s + o.amount, 0);
    const avgAmt = totalAmt / totalOrders;

    const influencerSet = new Set(orders.map(o => o.influencer));
    const categorySet = new Set(orders.map(o => o.category));
    const hourSet = new Set(orders.map(o => o.hour));

    const hoursList = [...hourSet].sort((a,b) => a-b);
    const hoursStr = hoursList.map(h => h+':00');

    // Sort influencers by order count
    const infCounts = {};
    orders.forEach(o => infCounts[o.influencer] = (infCounts[o.influencer]||0)+1);
    const infOrder = Object.entries(infCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

    // Sort categories by order count
    const catCounts = {};
    orders.forEach(o => catCounts[o.category] = (catCounts[o.category]||0)+1);
    const prodOrder = Object.entries(catCounts).sort((a,b) => b[1]-a[1]).map(e => e[0]);

    const dateLabel = orders[0].dt.toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'});

    // Update header info
    const minDt = new Date(Math.min(...orders.map(o => o.dt)));
    const maxDt = new Date(Math.max(...orders.map(o => o.dt)));
    const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    document.querySelector('.header p').textContent = `数据范围: ${fmt(minDt)} ~ ${fmt(maxDt)} | 总订单 ${totalOrders} 笔 | ${influencerSet.size} 个直播间 | ${hoursList.length} 个小时 | ${prodOrder.length} 个品类`;

    // Summary cards
    document.getElementById('summaryCards').innerHTML = `
        <div class="card"><div class="value">${totalOrders}</div><div class="label">总订单数</div></div>
        <div class="card orange"><div class="value">${totalAmt.toLocaleString('zh-CN',{maximumFractionDigits:0})}</div><div class="label">总销售额(元)</div></div>
        <div class="card green"><div class="value">${Math.round(avgAmt)}</div><div class="label">平均客单价(元)</div></div>
        <div class="card"><div class="value">${influencerSet.size}</div><div class="label">直播间数</div></div>
        <div class="card orange"><div class="value">${prodOrder.length}</div><div class="label">商品品类</div></div>
    `;

    // Helper: count orders matching filters
    function cnt(inf, hr, cat) {
        return orders.filter(o =>
            (!inf || o.influencer === inf) &&
            (hr === undefined || hr === null || o.hour === hr) &&
            (!cat || o.category === cat)
        ).length;
    }
    function amt(inf, hr, cat) {
        return orders.filter(o =>
            (!inf || o.influencer === inf) &&
            (hr === undefined || hr === null || o.hour === hr) &&
            (!cat || o.category === cat)
        ).reduce((s,o) => s + o.amount, 0);
    }

    // ============ Charts ============
    // Chart 1: Hourly bar
    const totalHourlyData = hoursList.map(h => cnt(null, h, null));
    const chart1 = echarts.init(document.getElementById('chart-hourly'));
    chart1.setOption({
        tooltip: {trigger:'axis'},
        title: {text:'全平台分小时订单量',left:'center',textStyle:{fontSize:14}},
        xAxis: {data:hoursStr},
        yAxis: {type:'value'},
        series: [{
            type:'bar',data:totalHourlyData,
            itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[
                {offset:0,color:'#667eea'},{offset:1,color:'#b8c4ff'}])},
            barWidth:'50%',label:{show:true,position:'top',fontSize:11,fontWeight:'bold'}
        }],
        grid: {left:'3%',right:'4%',top:'15%',bottom:'8%',containLabel:true}
    });

    // Chart 2: Pie
    const pieData = prodOrder.map(p => ({name:p, value:catCounts[p]}));
    const chart2 = echarts.init(document.getElementById('chart-product-pie'));
    chart2.setOption({
        tooltip: {trigger:'item',formatter:'{b}: {c}单 ({d}%)'},
        title: {text:'商品品类占比',left:'center',textStyle:{fontSize:14}},
        series: [{type:'pie',radius:['45%','72%'],data:pieData,
            label:{formatter:'{b}\n{d}%',fontSize:11},
            emphasis:{label:{fontSize:14,fontWeight:'bold'}}}]
    });

    // Chart 3: Heatmap
    const heatData = [];
    hoursList.forEach((h,hi) => {
        prodOrder.forEach((p,pi) => {
            const c = cnt(null, h, p);
            if (c > 0) heatData.push([hi, pi, c]);
        });
    });
    const maxHeat = Math.max(1, ...heatData.map(d => d[2]));
    const chart3 = echarts.init(document.getElementById('chart-heatmap'));
    chart3.setOption({
        tooltip: {formatter: p => p.data[1]!==undefined ? `${prodOrder[p.data[1]]} ${hoursStr[p.data[0]]}<br/>出单: ${p.data[2]}单` : ''},
        grid: {left:'18%',right:'5%',bottom:'12%',top:'3%'},
        xAxis: {data:hoursStr,type:'category',splitArea:{show:true}},
        yAxis: {data:prodOrder,type:'category',splitArea:{show:true},axisLabel:{fontSize:13,fontWeight:'bold'}},
        visualMap: {min:0,max:maxHeat,calculable:true,orient:'horizontal',left:'center',bottom:0,
            inRange:{color:['#f5f5ff','#c5c5ff','#8b8bff','#5555dd','#2d2d8f']}},
        series: [{type:'heatmap',data:heatData,label:{show:true,fontSize:12,fontWeight:'bold'},
            emphasis:{itemStyle:{shadowBlur:10,shadowColor:'rgba(0,0,0,0.3)'}}}]
    });

    // ============ Section 3: Product Tabs ============
    let prodTabsHtml = '';
    let prodPanelsHtml = '';
    prodOrder.forEach((prod, i) => {
        prodTabsHtml += `<button class="tab ${i===0?'active':''}" data-idx="${i}" data-group="prod">${prod}</button>`;

        prodPanelsHtml += `<div class="tab-panel ${i===0?'active':''}" id="prod-panel-${i}">`;
        prodPanelsHtml += `<h3>${prod} -- 各直播间分小时出单对比</h3>`;
        prodPanelsHtml += '<div class="scroll-wrap"><table><thead><tr><th class="sticky-col">小时</th>';
        infOrder.forEach(inf => prodPanelsHtml += `<th>${inf}</th>`);
        prodPanelsHtml += '<th style="background:#fffde0">合计</th></tr></thead><tbody>';

        hoursList.forEach(hr => {
            prodPanelsHtml += `<tr><td class="sticky-col"><strong>${hr}:00</strong></td>`;
            let rowTotal = 0;
            infOrder.forEach(inf => {
                const c = cnt(inf, hr, prod);
                rowTotal += c;
                prodPanelsHtml += c > 0 ? `<td style="font-weight:700;color:#667eea">${c}</td>` : '<td style="color:#ddd">-</td>';
            });
            prodPanelsHtml += `<td style="background:#fffde0;font-weight:700">${rowTotal || '-'}</td></tr>`;
        });

        prodPanelsHtml += '<tr style="background:#f8f8f8;font-weight:700"><td class="sticky-col" style="background:#f8f8f8">合计</td>';
        infOrder.forEach(inf => {
            const c = cnt(inf, null, prod);
            prodPanelsHtml += `<td>${c || '-'}</td>`;
        });
        prodPanelsHtml += `<td style="background:#fffde0">${catCounts[prod]}</td></tr>`;
        prodPanelsHtml += '</tbody></table></div></div>';
    });
    document.getElementById('prod-tabs').innerHTML = prodTabsHtml;
    document.getElementById('prod-panels').innerHTML = prodPanelsHtml;

    // ============ Section 4: Influencer Tabs ============
    let infTabsHtml = '';
    let infPanelsHtml = '';
    infOrder.forEach((inf, i) => {
        infTabsHtml += `<button class="tab ${i===0?'active':''}" data-idx="${i}" data-group="inf">${inf}</button>`;

        const infOrders = orders.filter(o => o.influencer === inf);
        const infTotal = infOrders.length;
        const infAmt = infOrders.reduce((s,o) => s + o.amount, 0);
        const infAvg = infTotal > 0 ? infAmt / infTotal : 0;
        const infCats = new Set(infOrders.map(o => o.category));
        const infHours = [...new Set(infOrders.map(o => o.hour))].sort((a,b) => a-b);

        infPanelsHtml += `<div class="tab-panel ${i===0?'active':''}" id="inf-panel-${i}">`;
        infPanelsHtml += '<div class="summary-cards">';
        infPanelsHtml += `<div class="card"><div class="value">${infTotal}</div><div class="label">总订单数</div></div>`;
        infPanelsHtml += `<div class="card orange"><div class="value">${infAmt.toLocaleString('zh-CN',{maximumFractionDigits:0})}</div><div class="label">总销售额(元)</div></div>`;
        infPanelsHtml += `<div class="card green"><div class="value">${Math.round(infAvg)}</div><div class="label">平均客单价(元)</div></div>`;
        infPanelsHtml += `<div class="card"><div class="value">${infCats.size}</div><div class="label">覆盖品类</div></div>`;
        infPanelsHtml += `<div class="card green"><div class="value">${infHours.length}</div><div class="label">活跃小时数</div></div>`;
        infPanelsHtml += '</div>';

        infPanelsHtml += '<h3>分小时分品类出单明细 + 环比</h3>';
        infPanelsHtml += '<div class="scroll-wrap"><table><thead><tr><th class="sticky-col">小时</th>';
        prodOrder.forEach(p => infPanelsHtml += `<th>${p}</th>`);
        infPanelsHtml += '<th style="background:#f0f4ff">合计订单</th><th style="background:#fff8f0">销售额(元)</th><th style="background:#f0fff0">环比</th></tr></thead><tbody>';

        let prevOrders = null;
        hoursList.forEach(hr => {
            infPanelsHtml += `<tr><td class="sticky-col"><strong>${hr}:00</strong></td>`;
            let rowTotal = 0, rowAmt = 0;
            prodOrder.forEach(prod => {
                const c = infOrders.filter(o => o.hour === hr && o.category === prod).length;
                rowTotal += c;
                if (c > 0) {
                    const a = infOrders.filter(o => o.hour === hr && o.category === prod).reduce((s,o) => s + o.amount, 0);
                    rowAmt += a;
                    infPanelsHtml += `<td style="font-weight:600;color:#667eea">${c}</td>`;
                } else {
                    infPanelsHtml += '<td style="color:#ddd">-</td>';
                }
            });
            if (rowTotal > 0) {
                infPanelsHtml += `<td style="background:#f0f4ff;font-weight:700">${rowTotal}</td>`;
                infPanelsHtml += `<td style="background:#fff8f0;font-weight:600">${Math.round(rowAmt).toLocaleString()}</td>`;
            } else {
                infPanelsHtml += '<td style="background:#f0f4ff;color:#ddd">-</td>';
                infPanelsHtml += '<td style="background:#fff8f0;color:#ddd">-</td>';
            }

            if (rowTotal === 0) {
                infPanelsHtml += '<td style="color:#ddd">-</td>';
            } else if (prevOrders === null || prevOrders === 0) {
                infPanelsHtml += '<td><span class="tag tag-new">首单</span></td>';
            } else {
                const change = (rowTotal - prevOrders) / prevOrders * 100;
                if (change > 0) infPanelsHtml += `<td><span class="pos">+${Math.round(change)}%</span></td>`;
                else if (change < 0) infPanelsHtml += `<td><span class="neg">${Math.round(change)}%</span></td>`;
                else infPanelsHtml += '<td>持平</td>';
            }
            infPanelsHtml += '</tr>';
            if (rowTotal > 0) prevOrders = rowTotal;
        });

        infPanelsHtml += '</tbody></table></div>';

        // Product time distribution
        infPanelsHtml += '<h3>各品类出单时段分布</h3>';
        const infCatCounts = {};
        infOrders.forEach(o => infCatCounts[o.category] = (infCatCounts[o.category]||0)+1);
        Object.entries(infCatCounts).sort((a,b) => b[1]-a[1]).forEach(([prod, count]) => {
            const prodHours = [...new Set(infOrders.filter(o => o.category===prod).map(o => o.hour))].sort((a,b)=>a-b);
            infPanelsHtml += `<div style="margin:4px 0"><strong>${prod}</strong> (${count}单): ${prodHours.map(h=>h+':00').join(' -> ')}</div>`;
        });

        infPanelsHtml += '</div>';
    });
    document.getElementById('inf-tabs').innerHTML = infTabsHtml;
    document.getElementById('inf-panels').innerHTML = infPanelsHtml;

    // ============ Tab Events ============
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            const group = this.dataset.group;
            const idx = this.dataset.idx;
            // Deactivate all tabs in this group
            document.querySelectorAll(`.tab[data-group="${group}"]`).forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            // Show matching panel
            const panelId = (group === 'prod' ? 'prod-panel-' : 'inf-panel-') + idx;
            const parent = this.closest('.section');
            parent.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            const panel = parent.querySelector('#' + panelId);
            if (panel) panel.classList.add('active');
        });
    });
}

// ============================================================
// File Handling
// ============================================================
function handleFile(event) {
    const file = event.target.files[0];
    if (file) processFile(file);
}

const dropZone = document.getElementById('dropZone');

['dragenter','dragover','dragleave','drop'].forEach(evt => {
    document.body.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
});

['dragenter','dragover'].forEach(evt => {
    dropZone.addEventListener(evt, () => dropZone.classList.add('drag-over'));
});

['dragleave','drop'].forEach(evt => {
    dropZone.addEventListener(evt, () => dropZone.classList.remove('drag-over'));
});

dropZone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
});

function processFile(file) {
    if (!file.name.match(/\.xlsx?$/i)) {
        showError('请上传 .xlsx 或 .xls 格式的Excel文件');
        return;
    }

    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('report').style.display = 'none';
    dropZone.classList.add('done');
    document.getElementById('fileName').textContent = file.name;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const wb = XLSX.read(e.target.result, {type:'array'});
            const sheet = wb.Sheets[wb.SheetNames[0]];
            const orders = parseExcel(sheet);

            if (orders.length === 0) {
                showError('未能解析到有效订单数据，请检查表格格式');
                document.getElementById('loading').style.display = 'none';
                return;
            }

            // Dispose old charts
            ['chart-hourly','chart-product-pie','chart-heatmap'].forEach(id => {
                const inst = echarts.getInstanceByDom(document.getElementById(id));
                if (inst) inst.dispose();
            });

            buildReport(orders);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('report').style.display = 'block';

            // Resize charts
            setTimeout(() => {
                ['chart-hourly','chart-product-pie','chart-heatmap'].forEach(id => {
                    const inst = echarts.getInstanceByDom(document.getElementById(id));
                    if (inst) inst.resize();
                });
            }, 100);

        } catch(err) {
            console.error(err);
            showError('解析失败: ' + err.message);
            document.getElementById('loading').style.display = 'none';
        }
    };
    reader.readAsArrayBuffer(file);
}

function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    dropZone.classList.remove('done');
    document.getElementById('fileName').textContent = '';
}

// Responsive resize
window.addEventListener('resize', () => {
    ['chart-hourly','chart-product-pie','chart-heatmap'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            const inst = echarts.getInstanceByDom(el);
            if (inst) inst.resize();
        }
    });
});
</script>
