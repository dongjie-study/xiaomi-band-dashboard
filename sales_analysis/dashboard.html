<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小米手环直播间竞对分析仪表盘</title>
<script src="chart.umd.min.js"></script>
<style>
  :root {
    --accent: #4ECDC4;
    --accent-gold: #FFD700;
    --text: #0f172a;
    --text-secondary: #64748b;
    --text-muted: #9ca3af;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,.10);
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    --border-light: #bcc3ce;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #f0f4f8;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== TOPBAR ===== */
  .content-topbar {
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #e8ecf1;
    padding: 0 24px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .content-topbar h1 {
    font-size: .95em;
    font-weight: 700;
    color: var(--text);
    margin: 0;
    white-space: nowrap;
    letter-spacing: -.01em;
  }
  .content-topbar select {
    padding: 6px 14px;
    border: 1px solid #dde1e6;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    min-width: 150px;
    transition: all var(--transition);
  }
  .content-topbar select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(78,205,196,.15);
  }

  .content-body {
    max-width: 1500px;
    margin: 0 auto;
    padding: 16px 20px;
  }

  h2 { color: var(--text); margin: 10px 0; font-size: 20px; font-weight: 700; }
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin: 16px 0; }
  .kpi-card { background: white; border-radius: var(--radius); padding: 22px 20px; box-shadow: var(--shadow-sm); border: 1px solid #e8ecf1; text-align: center; transition: transform var(--transition), box-shadow var(--transition); }
  .kpi-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .kpi-card.ours { border: 2px solid var(--accent-gold); background: linear-gradient(135deg, #fffdf0 0%, #fff 100%); }
  .kpi-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; font-weight: 600; }
  .kpi-card .value { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1.2; }
  .kpi-card .change { font-size: 12px; margin-top: 4px; font-weight: 600; }
  .kpi-card .change.up { color: #e74c3c; }
  .kpi-card .change.down { color: #27ae60; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
  .chart-card { background: white; border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); border: 1px solid #e8ecf1; transition: box-shadow var(--transition); }
  .chart-card:hover { box-shadow: var(--shadow-md); }
  .chart-card h3 { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; }
  .chart-container { position: relative; height: 320px; }
  .chart-container.tall { height: 400px; }
  .full-width { grid-column: 1 / -1; }
  .product-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  .product-table th, .product-table td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #f0f2f5; font-size: 13px; }
  .product-table th { color: var(--text-secondary); font-weight: 600; font-size: 11px; letter-spacing: .03em; text-transform: uppercase; }
  .product-table tbody tr { transition: background var(--transition); }
  .product-table tbody tr:hover { background: #f8fafc; }
  .product-table .bar-cell { width: 100px; }
  .product-table .bar { height: 8px; background: var(--accent); border-radius: 4px; display: inline-block; vertical-align: middle; }
  .product-table .bar-bg { width: 100px; height: 8px; background: #f0f2f5; border-radius: 4px; display: inline-block; vertical-align: middle; }
  .room-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin: 16px 0; }
  .room-card { background: white; border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-sm); border: 1px solid #e8ecf1; transition: transform var(--transition), box-shadow var(--transition); }
  .room-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .room-card.ours { border: 2px solid var(--accent-gold); }
  .room-card .room-name { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .room-card .room-name .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
  .room-card .room-name .badge.ours { background: #FFD700; color: #333; }
  .room-card .room-name .badge.comp { background: #e8ecf1; color: #64748b; }
  .room-card .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .room-card .stat-row .stat-label { color: var(--text-secondary); }
  .room-card .stat-row .stat-value { font-weight: 600; color: var(--text); }
  .summary-box { background: #fff; border-radius: var(--radius); padding: 22px 26px; box-shadow: var(--shadow-sm); border: 1px solid #e8ecf1; line-height: 2; font-size: 14px; }
  .summary-box h3 { margin-bottom: 8px; font-weight: 700; }
  .note { color: var(--text-secondary); font-size: 12px; text-align: center; margin-top: 8px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid #dde1e6; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-secondary); text-decoration: none; transition: all var(--transition); }
  .back-link:hover { color: #ff6900; border-color: #ff6900; background: #fff7ed; }
  .hourly-breakdown { margin: 16px 0; }
  .hourly-breakdown h2 { margin-bottom: 16px; }
  .hour-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .hour-card { background: white; border-radius: var(--radius); padding: 0; box-shadow: var(--shadow-sm); border: 1px solid #e8ecf1; overflow: hidden; transition: box-shadow var(--transition); }
  .hour-card:hover { box-shadow: var(--shadow-md); }
  .hour-card .hour-header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #FFD700; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .hour-card .hour-header .hour-label { font-size: 18px; font-weight: 700; }
  .hour-card .hour-header .hour-summary { font-size: 13px; color: #cbd5e1; text-align: right; }
  .hour-card .hour-header .hour-summary span { color: #fff; font-weight: 600; }
  .hour-card .hour-body { padding: 8px 0; max-height: 420px; overflow-y: auto; }
  .hour-card .hour-body table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .hour-card .hour-body th { padding: 6px 12px; text-align: left; color: var(--text-secondary); font-weight: 600; font-size: 11px; border-bottom: 2px solid #f0f2f5; position: sticky; top: 0; background: #fff; }
  .hour-card .hour-body td { padding: 5px 12px; border-bottom: 1px solid #f5f5f5; }
  .hour-card .hour-body tr:hover td { background: #f8fafc; }
  .hour-card .hour-body .pct-bar { display: inline-block; height: 6px; background: var(--accent); border-radius: 3px; vertical-align: middle; margin-right: 6px; }
  .hour-empty { text-align: center; color: #94a3b8; padding: 40px; font-size: 14px; }
  .daily-summary-module { margin: 24px 0; }
  .daily-summary-module h2 { margin-bottom: 16px; }
  .insight-line { margin: 6px 0; padding: 4px 0 4px 10px; border-left: 3px solid transparent; line-height: 1.6; }
  .insight-line.positive { border-left-color: #27ae60; }
  .insight-line.negative { border-left-color: #e74c3c; }
  .insight-line.neutral { border-left-color: var(--accent); }
  .daily-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .daily-table th, .daily-table td { padding: 6px 10px; text-align: center; border-bottom: 1px solid #f0f2f5; white-space: nowrap; }
  .daily-table th { background: #f8f9fc; color: var(--text-secondary); font-weight: 600; font-size: 11px; position: sticky; top: 0; z-index: 1; }
  .daily-table tbody tr { transition: background var(--transition); }
  .daily-table tbody tr:hover { background: #f8fafc; }
  .daily-table .change-up { color: #e74c3c; font-weight: 600; }
  .daily-table .change-down { color: #27ae60; font-weight: 600; }
  .daily-table .ours-bg { background: #fffdf0; }
  .daily-table .best-day { background: #f0fdf4; }
  .daily-table .worst-day { background: #fff5f5; }

  /* Tab buttons for product-room and room-detail */
  .tab-prodroom, .tab-roomdet { font-family: inherit; }
  .tab-prodroom:hover, .tab-roomdet:hover { opacity: 0.85; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .content-topbar { padding: 0 12px; }
    .content-topbar h1 { font-size: .8em; }
    .content-body { padding: 12px; }
    .kpi-row { grid-template-columns: 1fr; }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>

<!-- Loading overlay -->
<div id="loadingOverlay" style="display:flex;align-items:center;justify-content:center;position:fixed;inset:0;background:#f0f4f8;z-index:9999;flex-direction:column;gap:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;">
  <div style="width:40px;height:40px;border:3px solid #e8ecf1;border-top-color:#4ECDC4;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <div style="color:#64748b;font-size:14px;font-weight:500;">正在加载数据...</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<!-- ===== TOPBAR ===== -->
<div class="content-topbar">
  <h1>小米手环直播间竞对分析仪表盘</h1>
  <select id="roomSelector" onchange="switchRoom(this.value)">
    <option value="__all__">全部直播间（汇总）</option>
  </select>
</div>
<div class="content-body">

  <div class="kpi-row" id="kpiRow"></div>

  <!-- Room comparison cards (visible when "all rooms" selected) -->
  <div id="roomCardsSection" style="display:none;">
    <h2>各直播间对比</h2>

  <!-- Product + hourly charts -->
  <div class="charts-row">
    <div class="chart-card">

    <div class="chart-card">

      <h3>产品收入占比</h3>
      <div class="chart-container"><canvas id="chartRevenuePie"></canvas></div>

  </div>

  <!-- Multi-room overlay charts (visible when "all" selected) -->
  <div id="multiRoomCharts" style="display:none;">

    <div class="charts-row">
      <div class="chart-card full-width">

  <!-- Day-over-day comparison -->
  <div class="charts-row" id="comparisonCharts" style="display:none;">

  <!-- Product details table -->
  <div class="charts-row">

      <h3>产品销售明细</h3>
      <table class="product-table" id="productTable">
        <thead><tr>
          <th>排名</th><th>产品名称</th><th class="bar-cell">占比</th><th>订单数</th><th>销售额</th><th>均价</th>

  <!-- Hourly product breakdown -->
  <div class="hourly-breakdown">
    <h2>逐小时产品粒度分析</h2>

  <!-- ===== 商品品类 × 直播间 分小时出单对比 ===== -->
  <div class="chart-card full-width" id="prodRoomSection" style="margin:16px 0;">
    <h2>商品品类 × 直播间 分小时出单对比</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="prodRoomTabs"></div>
    <div id="prodRoomPanels"></div>
  </div>

  <!-- ===== 各直播间详细数据 -- 分小时分品类 + 环比 ===== -->
  <div class="chart-card full-width" id="roomDetailSection" style="margin:16px 0;">
    <h2>各直播间详细数据 — 分小时分品类 + 环比</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;" id="roomDetailTabs"></div>

  <!-- 每日数据总结分析模块 -->

    <!-- 今日数据洞察 -->
    <div class="summary-box" id="todayInsights" style="margin-bottom:20px;border:2px solid #FFD700;background:linear-gradient(135deg,#fffdf0 0%,#fff 100%);"></div>

    <div class="kpi-row" id="summaryKpiRow"></div>

</div><!-- /content-body -->

<script>
let DATA = null;
let HISTORY = [];
let currentDate = null;
let currentRoom = '__all__';
let dataReady = false;

// Async data loading — fetches history.json for better caching and faster initial render
(async function loadData() {
  try {
    // Daily cache-busting: refreshed once per day when data changes
    const cacheKey = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const resp = await fetch('./history.json?_=' + cacheKey);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    HISTORY = await resp.json();
    DATA = HISTORY[HISTORY.length - 1];
    dataReady = true;
  } catch(e) {
    // Fallback: try inline placeholders (legacy deployment)
    if (typeof __DATA_PLACEHOLDER__ !== 'undefined' && String(__DATA_PLACEHOLDER__) !== '__DATA_PLACEHOLDER__') {
      DATA = __DATA_PLACEHOLDER__;
      HISTORY = __HISTORY_PLACEHOLDER__;
      dataReady = true;
    }
  }
  if (!dataReady) {
    document.getElementById('loadingOverlay').innerHTML =
      '<div style="color:#e74c3c;font-size:14px;">⚠️ 数据加载失败，请刷新页面重试</div>';
    return;
  }
  currentDate = DATA.date;
  document.getElementById('loadingOverlay').style.display = 'none';
  initDashboard();
})();

// Extract room list
function getRooms(d) { return d.rooms ? Object.keys(d.rooms) : []; }

function getRoomData(d, room) {
  if (room === '__all__') return d;
  if (d.rooms && d.rooms[room]) {
    const r = d.rooms[room];
    return {
      date: d.date,
      total_orders: r.orders,
      total_revenue: r.revenue,
      avg_price: r.avg_price,
      products: r.products,
      _hourly_stats: r._hourly_stats || {},
      room: room
    };
  }
  return d;
}

function renderRoomSelector(d) {
  const rooms = getRooms(d);
  const sel = document.getElementById('roomSelector');
  sel.innerHTML = '<option value="__all__">全部直播间（汇总）</option>' +
    rooms.map(r => `<option value="${r}" ${r === currentRoom ? 'selected' : ''}>${r}</option>`).join('');
}

function switchRoom(room) {
  currentRoom = room;
  const d = HISTORY.find(h => h.date === currentDate);
  if (d) renderAll(d);
}

function formatCurrency(n) { return '¥' + Number(n).toLocaleString('zh-CN', {minimumFractionDigits: 0, maximumFractionDigits: 0}); }
function formatChange(current, previous) {
  if (previous === undefined || previous === null || previous === 0) return '';
  const diff = current - previous;
  const pct = (diff / previous * 100).toFixed(1);
  const cls = diff >= 0 ? 'up' : 'down';
  const sign = diff >= 0 ? '+' : '';
  return `<span class="change ${cls}">${sign}${diff.toLocaleString()} (${sign}${pct}%)</span>`;
}

let charts = {};
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};
}

function renderKPI(d, prev) {
  const container = document.getElementById('kpiRow');

  const isRoomView = currentRoom !== '__all__';
  const numCards = isRoomView ? 4 : 5;
  container.style.gridTemplateColumns = `repeat(${numCards}, 1fr)`;

  let html = `
    <div class="kpi-card${isRoomView ? '' : ''}">
      <div class="label">${isRoomView ? currentRoom : '总订单数'}</div>
      <div class="value">${d.total_orders.toLocaleString()}</div>
      <div class="change" id="kpiOrdersChange">${prev ? formatChange(d.total_orders, prev.total_orders) : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">总销售额</div>
      <div class="value">${formatCurrency(d.total_revenue)}</div>
      <div class="change">${prev ? formatChange(d.total_revenue, prev.total_revenue) : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">平均单价</div>
      <div class="value">${formatCurrency(d.avg_price)}</div>
      <div class="change">${prev ? formatChange(d.avg_price, prev.avg_price) : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">在售产品数</div>
      <div class="value">${Object.keys(d.products).length}</div>
    </div>`;

  if (!isRoomView) {
    const roomCount = getRooms(d).length;
    html += `
    <div class="kpi-card">
      <div class="label">直播间数</div>
      <div class="value">${roomCount}</div>
    </div>`;
  }

  container.innerHTML = html;
}

function renderRoomCards(d) {
  const rooms = getRooms(d);
  const section = document.getElementById('roomCardsSection');
  const cards = document.getElementById('roomCards');

  if (rooms.length <= 1) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  const totalOrders = d.total_orders;
  const sorted = rooms.map(r => ({name: r, ...d.rooms[r]})).sort((a, b) => b.orders - a.orders);

  cards.innerHTML = sorted.map((r, i) => {
    const pct = (r.orders / totalOrders * 100).toFixed(1);
    const topProd = Object.entries(r.products).sort((a, b) => b[1].orders - a[1].orders)[0];
    return `
    <div class="room-card" style="border-left: 4px solid ${['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4'][i % 4]}">
      <div class="room-name">
        ${i === 0 ? '👑 ' : ''}${r.name}
        <span class="badge comp">第${i+1}名</span>
      </div>
      <div class="stat-row"><span class="stat-label">订单数</span><span class="stat-value">${r.orders} 单 (${pct}%)</span></div>
      <div class="stat-row"><span class="stat-label">销售额</span><span class="stat-value">${formatCurrency(r.revenue)}</span></div>
      <div class="stat-row"><span class="stat-label">平均单价</span><span class="stat-value">${formatCurrency(r.avg_price)}</span></div>
      <div class="stat-row"><span class="stat-label">SKU数</span><span class="stat-value">${Object.keys(r.products).length}</span></div>
      <div class="stat-row"><span class="stat-label">销冠产品</span><span class="stat-value">${topProd[0]} (${topProd[1].orders}单)</span></div>
    </div>`;
  }).join('');
}

function renderProductChart(d) {
  const sorted = Object.entries(d.products).sort((a, b) => b[1].orders - a[1].orders);
  const labels = sorted.map(([name]) => name);
  const orders = sorted.map(([, info]) => info.orders);
  const revenues = sorted.map(([, info]) => info.revenue);
  const colors = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F7DC6F','#BB8FCE','#85C1E9','#98D8C8'];

  charts.productOrders = new Chart(document.getElementById('chartProductOrders'), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '订单量',
        data: orders,
        backgroundColor: colors.slice(0, labels.length),
        borderRadius: 6
      }]
    },
    options: {

function renderSummaryKPIs() {
  const ourOrders = HISTORY.map(d => (d.type_summary && d.type_summary['我方']) ? d.type_summary['我方'].orders : 0);
  const compOrders = HISTORY.map(d => (d.type_summary && d.type_summary['竞对']) ? d.type_summary['竞对'].orders : 0);
  const shares = ourOrders.map((o, i) => o + compOrders[i] > 0 ? (o / (o + compOrders[i]) * 100) : 0);

  const recent7 = ourOrders.slice(-7);
  const prev7 = ourOrders.slice(-14, -7);
  const avgOur = Math.round(recent7.reduce((a, b) => a + b, 0) / recent7.length);
  const avgPrevOur = prev7.length > 0 ? Math.round(prev7.reduce((a, b) => a + b, 0) / prev7.length) : null;
  const avgShare = shares.slice(-7).reduce((a, b) => a + b, 0) / Math.min(7, shares.slice(-7).length);
  const avgComp = Math.round(compOrders.slice(-7).reduce((a, b) => a + b, 0) / Math.min(7, compOrders.slice(-7).length));

  let bestIdx = 0, worstIdx = 0;
  ourOrders.forEach((o, i) => { if (o > ourOrders[bestIdx]) bestIdx = i; if (o < ourOrders[worstIdx]) worstIdx = i; });

  document.getElementById('summaryKpiRow').innerHTML = [
    { label: '我方日均订单 (7日)', value: avgOur.toLocaleString(), change: avgPrevOur != null ? formatChange(avgOur, avgPrevOur) : '' },
    { label: '我方日均份额 (7日)', value: avgShare.toFixed(1) + '%', change: '' },
    { label: '竞对日均订单 (7日)', value: avgComp.toLocaleString(), change: '' },
    { label: '最佳单日', value: HISTORY[bestIdx].date, change: '我方 ' + ourOrders[bestIdx].toLocaleString() + ' 单' },
    { label: '最差单日', value: HISTORY[worstIdx].date, change: '我方 ' + ourOrders[worstIdx].toLocaleString() + ' 单' },
  ].map(k => '<div class="kpi-card"><div class="label">' + k.label + '</div><div class="value">' + k.value + '</div><div class="change">' + k.change + '</div></div>').join('');
}

function renderDailyTable() {
  var thead = document.getElementById('dailyDetailTable').querySelector('thead');
  var tbody = document.getElementById('dailyDetailTable').querySelector('tbody');

  thead.innerHTML = '<tr><th>日期</th><th>总订单</th><th>我方订单</th><th>环比</th><th>竞对订单</th><th>我方份额</th><th>我方销售额</th><th>竞对销售额</th><th>我方直播间</th><th>竞对直播间</th></tr>';

  var ourOrders = HISTORY.map(function(d) { return (d.type_summary && d.type_summary['我方']) ? d.type_summary['我方'].orders : 0; });

  var bestOur = Math.max.apply(null, ourOrders);
  var worstOur = Math.min.apply(null, ourOrders);

  tbody.innerHTML = HISTORY.map(function(d, i) {
    var our = (d.type_summary && d.type_summary['我方']) || {orders:0, revenue:0, rooms:0};
    var comp = (d.type_summary && d.type_summary['竞对']) || {orders:0, revenue:0, rooms:0};
    var total = our.orders + comp.orders;
    var share = total > 0 ? (our.orders / total * 100).toFixed(1) : '0.0';

    var dodHtml = '-';
    if (i > 0) {
      var prevOur = (HISTORY[i-1].type_summary && HISTORY[i-1].type_summary['我方']) || {orders:0};
      var diff = our.orders - prevOur.orders;
      var pct = prevOur.orders > 0 ? (diff / prevOur.orders * 100) : 0;
      var cls = diff >= 0 ? 'change-up' : 'change-down';
      var sign = diff >= 0 ? '+' : '';
      dodHtml = '<span class="' + cls + '">' + sign + diff + ' (' + sign + pct.toFixed(1) + '%)</span>';
    }

    var rowClass = '';
    if (our.orders === bestOur) rowClass = 'best-day';
    else if (our.orders === worstOur) rowClass = 'worst-day';

    return '<tr class="' + rowClass + '"><td><strong>' + d.date + '</strong></td><td>' + total.toLocaleString() + '</td><td class="ours-bg">' + our.orders.toLocaleString() + '</td><td>' + dodHtml + '</td><td>' + comp.orders.toLocaleString() + '</td><td><strong>' + share + '%</strong></td><td>' + formatCurrency(our.revenue) + '</td><td>' + formatCurrency(comp.revenue) + '</td><td>' + (our.rooms || 0) + '</td><td>' + (comp.rooms || 0) + '</td></tr>';
  }).join('');
}

function renderDailyInsights() {
  if (HISTORY.length < 3) {
    document.getElementById('dailyInsights').innerHTML = '<h3>关键洞察</h3><p style="color:#888;">数据不足，需要至少3天数据才能生成分析。</p>';
    return;
  }

  var lines = [];
  var n = HISTORY.length;

  var ourOrders = HISTORY.map(function(d) { return (d.type_summary && d.type_summary['我方']) ? d.type_summary['我方'].orders : 0; });
  var compOrders = HISTORY.map(function(d) { return (d.type_summary && d.type_summary['竞对']) ? d.type_summary['竞对'].orders : 0; });
  var shares = ourOrders.map(function(o, i) { return o + compOrders[i] > 0 ? (o / (o + compOrders[i]) * 100) : 0; });
  var ourRevenues = HISTORY.map(function(d) { return (d.type_summary && d.type_summary['我方']) ? d.type_summary['我方'].revenue : 0; });

  // 1. Share trend: first 3 vs last 3
  var first3Share = (shares[0] + shares[1] + shares[2]) / 3;
  var last3Share = (shares[n-3] + shares[n-2] + shares[n-1]) / 3;
  var shareDelta = last3Share - first3Share;

  if (shareDelta > 1.5) {
    lines.push({ cls: 'positive', text: '&#x1F4C8; 我方份额呈上升趋势：近3日均 ' + last3Share.toFixed(1) + '%，较首3日均 ' + first3Share.toFixed(1) + '% 提升了 ' + shareDelta.toFixed(1) + ' 个百分点。' });
  } else if (shareDelta < -1.5) {
    lines.push({ cls: 'negative', text: '&#x1F4C9; 我方份额呈下降趋势：近3日均 ' + last3Share.toFixed(1) + '%，较首3日均 ' + first3Share.toFixed(1) + '% 下降了 ' + Math.abs(shareDelta).toFixed(1) + ' 个百分点，需重点关注。' });
  } else {
    lines.push({ cls: 'neutral', text: '&#x1F4CA; 我方份额整体稳定，近3日均 ' + last3Share.toFixed(1) + '%，波动在1.5个百分点以内。' });
  }

  // 2. Recent momentum (last 3 days vs previous 3 days)
  if (n >= 6) {
    var recent3 = (ourOrders[n-3] + ourOrders[n-2] + ourOrders[n-1]) / 3;
    var prev3 = (ourOrders[n-6] + ourOrders[n-5] + ourOrders[n-4]) / 3;
    if (prev3 > 0) {
      var momChange = (recent3 - prev3) / prev3 * 100;
      if (momChange > 10) {
        lines.push({ cls: 'positive', text: '&#x1F680; 我方近期增长强劲：近3天日均订单 ' + Math.round(recent3).toLocaleString() + ' 单，较前3天增长 ' + momChange.toFixed(1) + '%。' });
      } else if (momChange < -10) {
        lines.push({ cls: 'negative', text: '&#x26A0; 我方近期出现下滑：近3天日均订单 ' + Math.round(recent3).toLocaleString() + ' 单，较前3天下降 ' + Math.abs(momChange).toFixed(1) + '%。' });
      }
    }
  }

  // 3. Best and worst days
  var bestIdx = 0, worstIdx = 0;
  ourOrders.forEach(function(o, i) { if (o > ourOrders[bestIdx]) bestIdx = i; if (o < ourOrders[worstIdx]) worstIdx = i; });
  lines.push({ cls: 'neutral', text: '&#x1F3C6; 最佳单日：' + HISTORY[bestIdx].date + '，我方 ' + ourOrders[bestIdx].toLocaleString() + ' 单（份额 ' + shares[bestIdx].toFixed(1) + '%）。' });
  lines.push({ cls: 'neutral', text: '&#x1F4AD; 最低单日：' + HISTORY[worstIdx].date + '，我方 ' + ourOrders[worstIdx].toLocaleString() + ' 单（份额 ' + shares[worstIdx].toFixed(1) + '%）。' });

  // 4. Volatility: flag >5pp day-over-day share swings
  var bigSwings = [];
  for (var i = 1; i < shares.length; i++) {
    if (Math.abs(shares[i] - shares[i-1]) > 5) {
      bigSwings.push({ date: HISTORY[i].date, delta: (shares[i] - shares[i-1]).toFixed(1) });
    }
  }
  if (bigSwings.length > 0) {
    var last = bigSwings[bigSwings.length - 1];
    lines.push({ cls: 'negative', text: '&#x26A0; 共检测到 ' + bigSwings.length + ' 次份额大幅波动（日环比>5pp），最近一次：' + last.date + '（' + (last.delta > 0 ? '+' : '') + last.delta + 'pp），需关注异常原因。' });
  }

  // 5. Full-period cumulative
  var totalOur = ourOrders.reduce(function(a,b){return a+b;}, 0);
  var totalComp = compOrders.reduce(function(a,b){return a+b;}, 0);
  var totalOurRev = ourRevenues.reduce(function(a,b){return a+b;}, 0);
  var overallShare = (totalOur / (totalOur + totalComp) * 100).toFixed(1);
  var ourAvgPrice = totalOur > 0 ? (totalOurRev / totalOur).toFixed(0) : 0;
  lines.push({ cls: 'neutral', text: '&#x1F4CA; 全周期汇总：' + n + '天，我方累计 ' + totalOur.toLocaleString() + ' 单（占比 ' + overallShare + '%），销售额 ' + formatCurrency(totalOurRev) + '，均价 ' + formatCurrency(ourAvgPrice) + '。' });

  // 6. Room count stability
  var ourRoomsFirst = (HISTORY[0].type_summary && HISTORY[0].type_summary['我方']) ? HISTORY[0].type_summary['我方'].rooms : 0;
  var ourRoomsLast = (HISTORY[n-1].type_summary && HISTORY[n-1].type_summary['我方']) ? HISTORY[n-1].type_summary['我方'].rooms : 0;
  if (ourRoomsLast !== ourRoomsFirst) {
    lines.push({ cls: 'neutral', text: '&#x1F3EA; 我方直播间数量变化：从 ' + ourRoomsFirst + ' 间变为 ' + ourRoomsLast + ' 间。' });
  }

  document.getElementById('dailyInsights').innerHTML =
    '<h3>关键洞察</h3>' +
    lines.map(function(l) { return '<div class="insight-line ' + l.cls + '">' + l.text + '</div>'; }).join('');
}

function renderProdRoomHourly(d) {
  const section = document.getElementById('prodRoomSection');
  const rooms = d.rooms || {};
  const roomNames = Object.keys(rooms).sort((a,b) => rooms[b].orders - rooms[a].orders);
  if (roomNames.length <= 1) { section.style.display = 'none'; return; }
  section.style.display = '';

  // Collect all product categories across all rooms
  const prodSet = {};
  roomNames.forEach(rn => {
    const prods = rooms[rn].products || {};
    Object.keys(prods).forEach(p => { prodSet[p] = (prodSet[p]||0) + prods[p].orders; });
  });
  const prodOrder = Object.entries(prodSet).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  // Build tabs
  let tabsHtml = '', panelsHtml = '';
  prodOrder.forEach((prod, i) => {
    tabsHtml += `<button class="tab-prodroom ${i===0?'active':''}" onclick="switchProdRoomTab(${i})" style="padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;border:1px solid #dde1e6;background:${i===0?'#4ECDC4':'#fff'};color:${i===0?'#fff':'#64748b'};font-weight:500;transition:all .2s">${prod}</button>`;

    // Build table
    panelsHtml += `<div class="prodroom-panel" id="prodroom-panel-${i}" style="display:${i===0?'block':'none'}">`;
    panelsHtml += '<div style="overflow-x:auto;max-height:520px;overflow-y:auto;border-radius:8px;border:1px solid #e8ecf1">';
    panelsHtml += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    panelsHtml += '<thead><tr style="position:sticky;top:0;z-index:2"><th style="position:sticky;left:0;background:#f8f9fc;z-index:3;text-align:left;padding:8px 12px">小时</th>';
    roomNames.forEach(rn => {
      panelsHtml += `<th style="background:#f8f9fc;padding:6px 10px;text-align:center;font-size:11px">${rn}</th>`;
    });
    panelsHtml += '<th style="background:#fffde0;padding:6px 10px;text-align:center">合计</th></tr></thead><tbody>';

    for (let h = 0; h < 24; h++) {
      panelsHtml += `<tr><td style="position:sticky;left:0;background:#fff;font-weight:600;padding:6px 12px;z-index:1">${h}:00</td>`;
      let rowTotal = 0;
      roomNames.forEach(rn => {
        const hd = (rooms[rn]._hourly_stats || {})[String(h)] || {};
        const pp = (hd.products || {})[prod] || {};
        const c = pp.orders || 0;
        rowTotal += c;
        panelsHtml += c > 0
          ? `<td style="text-align:center;font-weight:700;color:#4ECDC4;padding:5px">${c}</td>`
          : '<td style="text-align:center;color:#ddd;padding:5px">-</td>';
      });
      panelsHtml += `<td style="text-align:center;background:#fffde0;font-weight:700">${rowTotal || '-'}</td></tr>`;
    }

    // Totals row
    panelsHtml += '<tr style="background:#f8fafc;font-weight:700"><td style="position:sticky;left:0;background:#f8fafc;font-weight:700;padding:8px 12px">合计</td>';
    roomNames.forEach(rn => {
      const c = (rooms[rn].products || {})[prod];
      panelsHtml += `<td style="text-align:center;padding:6px">${c ? c.orders : '-'}</td>`;
    });
    panelsHtml += `<td style="text-align:center;background:#fffde0">${prodSet[prod]}</td></tr>`;
    panelsHtml += '</tbody></table></div></div>';
  });

  document.getElementById('prodRoomTabs').innerHTML = tabsHtml;
  document.getElementById('prodRoomPanels').innerHTML = panelsHtml;
}

function switchProdRoomTab(idx) {
  document.querySelectorAll('.tab-prodroom').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    t.style.background = i === idx ? '#4ECDC4' : '#fff';
    t.style.color = i === idx ? '#fff' : '#64748b';
  });
  document.querySelectorAll('.prodroom-panel').forEach((p, i) => {
    p.style.display = i === idx ? 'block' : 'none';

}

// ===== 各直播间详细数据 -- 分小时分品类 + 环比 =====
function renderRoomDetailHourly(d) {
  const section = document.getElementById('roomDetailSection');
  const rooms = d.rooms || {};
  const roomNames = Object.keys(rooms).sort((a,b) => rooms[b].orders - rooms[a].orders);
  if (roomNames.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';

  // Build product order from all rooms
  const prodSet = {};
  roomNames.forEach(rn => {
    Object.keys(rooms[rn].products || {}).forEach(p => {
      prodSet[p] = (prodSet[p]||0) + rooms[rn].products[p].orders;
    });
  });
  const prodOrder = Object.entries(prodSet).sort((a,b) => b[1]-a[1]).map(e => e[0]);

  // Yesterday data for DoD
  let yesterdayRooms = {};
  if (HISTORY.length > 1) {
    const prev = HISTORY[HISTORY.length - 2];
    yesterdayRooms = prev.rooms || {};
  }

  let tabsHtml = '', panelsHtml = '';
  roomNames.forEach((rn, i) => {
    const room = rooms[rn];
    const yestRoom = yesterdayRooms[rn] || {};
    const yestHourly = yestRoom._hourly_stats || {};

    tabsHtml += `<button class="tab-roomdet ${i===0?'active':''}" onclick="switchRoomDetailTab(${i})" style="padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;border:1px solid #dde1e6;background:${i===0?'#667eea':'#fff'};color:${i===0?'#fff':'#64748b'};font-weight:500;transition:all .2s">${rn} (${room.orders}单)</button>`;

    // Summary cards
    const activeHours = Object.keys(room._hourly_stats || {}).length;
    const yestOrders = yestRoom.orders || 0;
    const dodPct = yestOrders > 0 ? ((room.orders - yestOrders) / yestOrders * 100).toFixed(1) : null;

    panelsHtml += `<div class="roomdet-panel" id="roomdet-panel-${i}" style="display:${i===0?'block':'none'}">`;
    panelsHtml += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">';
    panelsHtml += `<div style="flex:1;min-width:100px;background:#f5f3ff;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:#667eea">${room.orders}</div><div style="font-size:11px;color:#64748b">总订单</div></div>`;
    panelsHtml += `<div style="flex:1;min-width:100px;background:#fff8f0;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:#f0a050">¥${Math.round(room.revenue).toLocaleString()}</div><div style="font-size:11px;color:#64748b">销售额</div></div>`;
    panelsHtml += `<div style="flex:1;min-width:100px;background:#f0fdf6;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:#50b080">¥${Math.round(room.avg_price)}</div><div style="font-size:11px;color:#64748b">均价</div></div>`;
    panelsHtml += `<div style="flex:1;min-width:100px;background:#eff6ff;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:#3b82f6">${Object.keys(room.products).length}</div><div style="font-size:11px;color:#64748b">品类数</div></div>`;
    panelsHtml += `<div style="flex:1;min-width:100px;background:#fef3c7;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:#d97706">${activeHours}</div><div style="font-size:11px;color:#64748b">活跃小时</div></div>`;
    if (dodPct !== null) {
      const dodColor = parseFloat(dodPct) >= 0 ? '#e74c3c' : '#27ae60';
      const arrow = parseFloat(dodPct) >= 0 ? '↑' : '↓';
      panelsHtml += `<div style="flex:1;min-width:100px;background:#fdf2f8;border-radius:10px;padding:14px;text-align:center"><div style="font-size:24px;font-weight:800;color:${dodColor}">${arrow}${dodPct}%</div><div style="font-size:11px;color:#64748b">环比前日</div></div>`;
    }
    panelsHtml += '</div>';

    // Hourly table
    panelsHtml += '<div style="overflow-x:auto;max-height:500px;overflow-y:auto;border-radius:8px;border:1px solid #e8ecf1">';
    panelsHtml += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
    panelsHtml += '<thead><tr style="position:sticky;top:0;z-index:2"><th style="position:sticky;left:0;background:#f8f9fc;z-index:3;text-align:left;padding:8px 12px">小时</th>';
    prodOrder.forEach(p => {
      panelsHtml += `<th style="background:#f8f9fc;padding:6px 8px;text-align:center;font-size:11px">${p}</th>`;
    });
    panelsHtml += '<th style="background:#f0f4ff;padding:6px 8px;text-align:center">合计</th><th style="background:#fff8f0;padding:6px 8px;text-align:center">销售额</th><th style="background:#f0fff0;padding:6px 8px;text-align:center">环比</th></tr></thead><tbody>';

    let prevRowTotal = null;
    for (let h = 0; h < 24; h++) {
      const hd = (room._hourly_stats || {})[String(h)] || {};
      const hprods = hd.products || {};
      const rowOrders = hd.orders || 0;
      const rowRev = hd.revenue || 0;

      if (rowOrders === 0) continue; // Skip empty hours

      panelsHtml += `<tr><td style="position:sticky;left:0;background:#fff;font-weight:600;padding:6px 12px">${h}:00</td>`;
      prodOrder.forEach(p => {
        const c = (hprods[p] || {}).orders || 0;
        panelsHtml += c > 0
          ? `<td style="text-align:center;font-weight:600;color:#667eea;padding:5px">${c}</td>`
          : '<td style="text-align:center;color:#ddd;padding:5px">-</td>';
      });
      panelsHtml += `<td style="text-align:center;background:#f0f4ff;font-weight:700">${rowOrders}</td>`;
      panelsHtml += `<td style="text-align:center;background:#fff8f0;font-weight:600">¥${Math.round(rowRev).toLocaleString()}</td>`;

      // DoD comparison
      const yestHd = yestHourly[String(h)] || {};
      const yestOrders = yestHd.orders || 0;
      if (rowOrders === 0) {
        panelsHtml += '<td style="text-align:center;color:#ddd">-</td>';
      } else if (prevRowTotal === null || yestOrders === 0) {
        panelsHtml += '<td style="text-align:center"><span style="font-size:10px;background:#ede9fe;color:#5b4fcf;padding:2px 6px;border-radius:4px">首单</span></td>';
      } else {
        const change = ((rowOrders - yestOrders) / yestOrders * 100);
        if (change > 0) panelsHtml += `<td style="text-align:center;color:#e74c3c;font-weight:600">+${Math.round(change)}%</td>`;
        else if (change < 0) panelsHtml += `<td style="text-align:center;color:#27ae60;font-weight:600">${Math.round(change)}%</td>`;
        else panelsHtml += '<td style="text-align:center;color:#94a3b8">持平</td>';
      }
      panelsHtml += '</tr>';
      if (rowOrders > 0) prevRowTotal = rowOrders;
    }
    panelsHtml += '</tbody></table></div>';

    // Product time distribution
    panelsHtml += '<div style="margin-top:12px;padding:12px 16px;background:#f8fafc;border-radius:8px;font-size:13px">';
    panelsHtml += '<strong>各品类出单时段：</strong>';
    const catHours = {};
    Object.entries(room._hourly_stats || {}).forEach(([h, hd]) => {
      Object.keys(hd.products || {}).forEach(p => {
        if (!catHours[p]) catHours[p] = [];
        catHours[p].push(parseInt(h));
      });
    });
    Object.entries(catHours).sort((a,b) => {
      const aTotal = (room.products[a[0]] || {}).orders || 0;
      const bTotal = (room.products[b[0]] || {}).orders || 0;
      return bTotal - aTotal;
    }).forEach(([prod, hours]) => {
      const total = (room.products[prod] || {}).orders || 0;
      hours.sort((a,b) => a-b);
      panelsHtml += `<div style="margin:3px 0">📦 <strong>${prod}</strong> (${total}单): ${hours.map(h=>h+':00').join(' → ')}</div>`;
    });
    panelsHtml += '</div>';

    panelsHtml += '</div>';
  });

  document.getElementById('roomDetailTabs').innerHTML = tabsHtml;
  document.getElementById('roomDetailPanels').innerHTML = panelsHtml;
}

function switchRoomDetailTab(idx) {
  document.querySelectorAll('.tab-roomdet').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
    t.style.background = i === idx ? '#667eea' : '#fff';

  });

  });
}

function renderTodayInsights() {
  const container = document.getElementById('todayInsights');
  if (!DATA || HISTORY.length < 1) { container.innerHTML = ''; return; }

  const today = DATA;
  const prev = HISTORY.length > 1 ? HISTORY[HISTORY.length - 2] : null;
  const dateLabel = today.date;

  // Team totals
  const typeSummary = today.type_summary || {};
  const our = typeSummary['我方'] || {orders:0, revenue:0, avg_price:0, rooms:0};
  const jx = typeSummary['机械空间'] || {orders:0, revenue:0, avg_price:0, rooms:0};
  const zh = typeSummary['纵横'] || {orders:0, revenue:0, avg_price:0, rooms:0};
  const lm = typeSummary['良米'] || {orders:0, revenue:0, avg_price:0, rooms:0};
  const share = today.total_orders > 0 ? (our.orders / today.total_orders * 100).toFixed(1) : 0;

  // Yesterday comparison
  let dodHtml = '';
  if (prev && prev.type_summary && prev.type_summary['我方']) {
    const prevOur = prev.type_summary['我方'].orders;
    const diff = our.orders - prevOur;
    const pct = prevOur > 0 ? (diff / prevOur * 100).toFixed(1) : 0;
    const arrow = diff >= 0 ? '📈' : '📉';
    const color = diff >= 0 ? '#e74c3c' : '#27ae60';
    dodHtml = `<span style="color:${color}">${arrow} 环比 ${diff>=0?'+':''}${diff}单 (${diff>=0?'+':''}${pct}%)</span>`;
  }

  // Top rooms (by revenue)
  const rooms = today.rooms || {};
  const roomSorted = Object.entries(rooms).sort((a,b) => b[1].revenue - a[1].revenue);
  const topRoom = roomSorted[0];
  const topOurRoom = roomSorted.filter(([n]) => rooms[n].type === '我司')[0];

  // Top products
  const prodSorted = Object.entries(today.products || {}).sort((a,b) => b[1].orders - a[1].orders);
  const top3Prods = prodSorted.slice(0, 3);

  // Peak hours
  const hourly = today._hourly_stats || {};
  const hourSorted = Object.entries(hourly).sort((a,b) => b[1].orders - a[1].orders);
  const peakHours = hourSorted.slice(0, 3);

  // Our rooms detail
  const ourRooms = Object.entries(rooms).filter(([n, r]) => r.type === '我司').sort((a,b) => b[1].orders - a[1].orders);
  const ourRoomsList = ourRooms.map(([n, r]) => `<strong>${n}</strong>(${r.orders}单/¥${Math.round(r.revenue).toLocaleString()})`).join('、');

  // Competitor strength
  const compTypes = [];
  if (jx.orders > 0) compTypes.push(`机械空间 ${jx.orders}单(¥${Math.round(jx.revenue).toLocaleString()})`);
  if (zh.orders > 0) compTypes.push(`纵横 ${zh.orders}单(¥${Math.round(zh.revenue).toLocaleString()})`);
  if (lm.orders > 0) compTypes.push(`良米 ${lm.orders}单(¥${Math.round(lm.revenue).toLocaleString()})`);

  // Build HTML
  let html = '<h3>📋 ' + dateLabel + ' 数据洞察</h3>';

  // Overall summary
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin:12px 0;">';

  html += '<div style="background:#f8fafc;border-radius:10px;padding:14px 18px;">';
  html += '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">📊 今日总览</div>';
  html += '<div style="font-size:14px;line-height:1.8;">';
  html += '全渠道 <strong>' + today.total_orders.toLocaleString() + '单</strong>，销售额 <strong>¥' + Math.round(today.total_revenue).toLocaleString() + '</strong><br>';
  html += '我司 <strong style="color:#1E90FF">' + our.orders.toLocaleString() + '单</strong>（份额 <strong>' + share + '%</strong>），' + our.rooms + '个直播间<br>';
  html += dodHtml ? '较前日：' + dodHtml + '<br>' : '';
  html += '</div></div>';

  html += '<div style="background:#f8fafc;border-radius:10px;padding:14px 18px;">';
  html += '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">⚔️ 竞对格局</div>';
  html += '<div style="font-size:14px;line-height:1.8;">';
  html += compTypes.join('<br>');
  html += '</div></div>';

  html += '<div style="background:#f8fafc;border-radius:10px;padding:14px 18px;">';
  html += '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">🏪 我司直播间</div>';
  html += '<div style="font-size:13px;line-height:1.8;">';
  html += ourRoomsList || '无';
  html += '</div></div>';

  html += '</div>';

  // Key data points
  html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin:8px 0;">';

  if (topRoom) {
    const marker = rooms[topRoom[0]].type === '我司' ? '⭐' : '·';
    html += '<div class="insight-line neutral">🏆 销冠直播间：' + marker + ' <strong>' + topRoom[0] + '</strong> — ' + topRoom[1].orders.toLocaleString() + '单 / ¥' + Math.round(topRoom[1].revenue).toLocaleString() + '</div>';
  }

  html += '<div class="insight-line neutral">📦 热销TOP3：';
  html += top3Prods.map((p, i) => (i+1) + '.' + p[0] + '(' + p[1].orders + '单)').join(' | ');
  html += '</div>';

  html += '<div class="insight-line neutral">⏰ 出单高峰：';
  html += peakHours.map(h => h[0] + ':00(' + h[1].orders + '单)').join(' → ');
  html += '</div>';

  // Team comparison
  if (our.avg_price > 0) {
    const priceCompare = [];
    if (jx.avg_price > 0) priceCompare.push('机械¥' + Math.round(jx.avg_price));
    if (zh.avg_price > 0) priceCompare.push('纵横¥' + Math.round(zh.avg_price));
    if (lm.avg_price > 0) priceCompare.push('良米¥' + Math.round(lm.avg_price));
    html += '<div class="insight-line neutral">💰 我司均价 ¥' + Math.round(our.avg_price) + ' | ' + priceCompare.join(' | ') + '</div>';
  }

  // Share position
  if (share > 35) {
    html += '<div class="insight-line positive">✅ 今日份额 ' + share + '% 表现良好，超过35%关口</div>';
  } else if (share < 25) {
    html += '<div class="insight-line negative">⚠️ 今日份额仅 ' + share + '%，低于25%，需重点关注</div>';
  } else {
    html += '<div class="insight-line neutral">📊 今日份额 ' + share + '% 处于中等水平（25%-35%区间）</div>';
  }

  html += '</div>';

  container.innerHTML = html;
}

function renderDailySummary() {
  const module = document.getElementById('dailySummaryModule');
  // 仅全部直播间汇总页面显示每日总结模块，单直播间不显示
  if (currentRoom !== '__all__') {
    module.style.display = 'none';
    return;
  }
  module.style.display = '';
  if (HISTORY.length < 2) {
    module.innerHTML = '<h2>每日数据总结分析</h2><div class="hour-empty">历史数据不足（需要至少2天数据）</div>';
    return;
  }
  renderTodayInsights();
  renderSummaryKPIs();
  renderDailyTrendChart();
  renderDailyTable();
  renderDailyInsights();
}

// Init — read date from URL hash (set by root sidebar) or default to latest
function initDashboard() {
  function loadDate(date) {
    const d = HISTORY.find(h => h.date === date);
    if (!d) return;
    currentDate = date;
    const idx = HISTORY.findIndex(h => h.date === date);
    const prev = idx > 0 ? HISTORY[idx - 1] : null;
    renderAll(d, prev);
    renderRoomSelector(d);
    renderDailySummary();
  }

  const hashDate = window.location.hash.replace('#', '');
  loadDate(hashDate && HISTORY.some(h => h.date === hashDate) ? hashDate : DATA.date);

  // Listen for hash changes (root sidebar clicks different date → iframe src hash changes)
  window.addEventListener('hashchange', function() {
    const h = window.location.hash.replace('#', '');
    if (h && h !== currentDate) loadDate(h);
  });
}
